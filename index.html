        const fileToBase64 = (file) => new Promise((resolve, reject) => {

            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // COMPRESION DEL LADO DEL CLIENTE PARA IMAGENES (CANVAS)
        const comprimirImagen = (file, maxWidth = 1024, quality = 0.6) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height && width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        } else if (height > maxWidth) {
                            width = Math.round((width * maxWidth) / height);
                            height = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Retorna base64 comprimido
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = (error) => reject(error);
                };
                reader.onerror = (error) => reject(error);
            });
        };

        const calcularCumplimiento = (fechaInicio, fechaFin) => {
            if (!fechaFin || !fechaInicio) return 0;
            const start = new Date(fechaInicio); start.setHours(0, 0, 0, 0);
            const end = new Date(fechaFin); end.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);

            const totalDiff = end.getTime() - start.getTime();
            if (totalDiff <= 0) return 100;
            const currentDiff = today.getTime() - start.getTime();
            let percent = (currentDiff / totalDiff) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            return Math.round(percent);
        };

        const calcularPromedioChecklist = (items) => {
            if (!items || items.length === 0) return 0;
            // Se consideran solo elementos activos en los cálculos promedio
            const activos = items.filter(it => (it.Estado || it.estado) !== 'Inactivo');
            if (activos.length === 0) return 0;
            let total = 0;
            activos.forEach(it => { total += calcularCumplimiento(it.FechaInicio || it.fechaInicio, it.FechaFin || it.fechaFin); });
            return Math.round(total / activos.length);
        };

        const calcularPromedioReal = (items) => {
            if (!items || items.length === 0) return 0;
            const activos = items.filter(it => (it.Estado || it.estado) !== 'Inactivo');
            if (activos.length === 0) return 0;
            let total = 0;
            activos.forEach(it => { total += parseInt(it.Avance || it.avance) || 0; });
            return Math.round(total / activos.length);
        };

            React.useEffect(() => {
                setQuery(value || '');
            }, [value]);

                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            React.useEffect(() => {
                if (!query || query === value || readOnly) {
                    setResults([]);
                    return;
                }

                    setLoading(true);

                                    QueryString: query

                        });

                        setIsOpen(true);

       const DashboardCharts = ({ items, theme }) => {
            if (!items || items.length === 0) return null;
            const activos = items.filter(it => (it.Estado || it.estado) !== 'Inactivo');
            if (activos.length === 0) return null;

            const avanceGeneral = Math.round(activos.reduce((acc, it) => acc + (parseInt(it.Avance || it.avance) || 0), 0) / activos.length);

            const respMap = {};
            activos.forEach(it => {
                const r = it.NombreResponsable || it.nombreResponsable || 'Sin asignar';
                if (!respMap[r]) respMap[r] = { total: 0, count: 0 };
                respMap[r].total += parseInt(it.Avance || it.avance) || 0;
                respMap[r].count += 1;
            });

            const dataChart = Object.keys(respMap).map(k => ({
                name: k,
                avg: Math.round(respMap[k].total / respMap[k].count)
            })).sort((a, b) => b.avg - a.avg);

            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (avanceGeneral / 100) * circumference;

            const cardBg = theme === 'dark'
                ? 'bg-black/80 border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)]'
                : 'bg-white border-slate-200 shadow-md shadow-slate-100';
            
            const textColor = theme === 'dark' ? 'text-white' : 'text-slate-900';
            const labelColor = theme === 'dark' ? 'text-white/50' : 'text-slate-500';
            const trackStroke = theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';
            const barBg = theme === 'dark' ? 'bg-white/5 border-white/5' : 'bg-slate-100 border-slate-200';

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8 animate-[fadeIn_0.5s_ease-out]">
                    <div className={`${cardBg} backdrop-blur-2xl p-6 rounded-3xl border flex flex-col items-center justify-center`}>
                        <h3 className={`text-xs font-bold uppercase tracking-wider mb-6 ${labelColor}`}>{"% Avance General"}</h3>
                        <div className="relative w-40 h-40 flex items-center justify-center">
                            <svg className="w-full h-full transform -rotate-90">
                                <circle cx="80" cy="80" r={radius} fill="transparent" stroke={trackStroke} strokeWidth="20" />
                                <circle cx="80" cy="80" r={radius} fill="transparent" stroke="#eab308" strokeWidth="20" strokeDasharray={circumference} strokeDashoffset={offset} className="transition-all duration-1000 ease-out" strokeLinecap="round" />
                            </svg>
                            <span className={`absolute text-3xl font-black ${textColor}`}>{avanceGeneral}%</span>
                        </div>
                    </div>

                    <div className={`md:col-span-2 ${cardBg} backdrop-blur-2xl p-6 rounded-3xl border`}>
                        <h3 className={`text-xs font-bold uppercase tracking-wider mb-6 ${labelColor}`}>{"Promedio por Responsable (Activos)"}</h3>
                        <div className="space-y-4 max-h-[200px] overflow-y-auto pr-2">
                            {dataChart.map((d, i) => (
                                <div key={i} className="flex items-center gap-4 text-xs">
                                    <div className={`w-[140px] truncate text-right font-medium ${theme === 'dark' ? 'text-white/80' : 'text-slate-700'}`} title={d.name}>{d.name}</div>
                                    <div className={`flex-1 h-6 rounded-full overflow-hidden relative border ${barBg}`}>
                                        <div className="h-full bg-gradient-to-r from-yellow-600 to-yellow-400 transition-all duration-1000" style={{ width: `${d.avg}%` }}></div>
                                    </div>
                                    <div className={`w-[40px] font-bold ${textColor}`}>{d.avg}%</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const GanttChart = ({ items }) => {
            if (!items || items.length === 0) return null;
            const activos = items.filter(it => (it.Estado || it.estado) !== 'Inactivo');
            if (activos.length === 0) return null;

            const getValidDate = (d) => d ? new Date(d) : null;
            let minDate = new Date('2999-12-31');
            let maxDate = new Date('1970-01-01');
            let hasAnyDate = false;

            activos.forEach(it => {
                const d1 = getValidDate(it.FechaBaselineInicio || it.fechaBaselineInicio);
                const d2 = getValidDate(it.FechaBaselineFin || it.fechaBaselineFin);
                const d3 = getValidDate(it.FechaInicio || it.fechaInicio);
                const d4 = getValidDate(it.FechaFin || it.fechaFin);

                if (d1 && d1 < minDate) { minDate = d1; hasAnyDate = true; }
                if (d3 && d3 < minDate) { minDate = d3; hasAnyDate = true; }
                if (d2 && d2 > maxDate) { maxDate = d2; hasAnyDate = true; }
                if (d4 && d4 > maxDate) { maxDate = d4; hasAnyDate = true; }
            });

            if (!hasAnyDate) return (
                <div className="bg-gray-900/80 p-6 rounded-2xl border border-white/20 shadow-2xl mt-8 text-center text-white/50">
                    {"No hay tareas activas con Fechas v\u00e1lidas para generar el Diagrama de Gantt."}
                </div>
            );

            let totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);
            if (totalDays <= 0) totalDays = 1;

            return (
                <div className="bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] mt-8 overflow-x-auto animate-[fadeIn_0.5s_ease-out]">
                    <h3 className="text-xl font-bold text-yellow-400 mb-6 flex items-center gap-2">
                        <svg className="w-6 h-6 inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 13v-1m4 1v-3m4 3V8M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg> {"Diagrama de Gantt del Checklist (Tareas Activas)"}
                    </h3>

                    <div className="min-w-[800px] pb-4">
                        <div className="flex justify-between text-xs font-bold text-white/50 mb-3 px-[220px] border-b border-white/10 pb-2">
                            <span>{"Inicio Proyecto: "}{minDate.toISOString().split('T')[0]}</span>
                            <span>{"Fin Proyecto: "}{maxDate.toISOString().split('T')[0]}</span>
                        </div>

                        <div className="space-y-4 relative">
                            {activos.map((it, idx) => {
                                const baseStart = getValidDate(it.FechaBaselineInicio || it.fechaBaselineInicio);
                                const baseEnd = getValidDate(it.FechaBaselineFin || it.fechaBaselineFin);
                                const actStart = getValidDate(it.FechaInicio || it.fechaInicio);
                                const actEnd = getValidDate(it.FechaFin || it.fechaFin);
                                const avance = parseInt(it.Avance || it.avance) || 0;

                                let baseLeftPercent = 0, baseWidthPercent = 0;
                                if (baseStart && baseEnd) {
                                    const leftDays = (baseStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (baseEnd - baseStart) / (1000 * 60 * 60 * 24);
                                    if (durDays < 1) durDays = 1;
                                    baseLeftPercent = (leftDays / totalDays) * 100;
                                    baseWidthPercent = (durDays / totalDays) * 100;
                                }

                                let actLeftPercent = 0, actWidthPercent = 0;
                                if (actStart && actEnd) {
                                    const leftDays = (actStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (actEnd - actStart) / (1000 * 60 * 60 * 24);
                                    if (durDays < 1) durDays = 1;
                                    actLeftPercent = (leftDays / totalDays) * 100;
                                    actWidthPercent = (durDays / totalDays) * 100;
                                }

                                return (
                                    <div key={it.Id || idx} className="flex items-center gap-4 text-sm group">
                                        <div className="w-[200px] flex-shrink-0 text-white/80 whitespace-normal break-words font-medium text-xs leading-tight" title={it.Descripcion || it.actividades}>
                                            <span className="text-white/40 mr-1 font-bold">{idx + 1}.</span> {it.Descripcion || it.actividades}
                                        </div>

                                        <div className="flex-1 bg-white/5 h-12 rounded-lg relative overflow-hidden flex flex-col justify-center gap-1 border border-white/5">

                                            {baseStart && baseEnd && (
                                                <div
                                                    className="absolute h-2 top-1.5 bg-[repeating-linear-gradient(45deg,transparent,transparent_2px,rgba(96,165,250,0.5)_2px,rgba(96,165,250,0.5)_4px)] bg-blue-900/30 border border-blue-400/50 rounded-sm"
                                                    style={{ left: `${baseLeftPercent}%`, width: `${baseWidthPercent}%` }}
                                                    title={`Planificado (Baseline): ${(it.FechaBaselineInicio || it.fechaBaselineInicio)} a ${(it.FechaBaselineFin || it.fechaBaselineFin)}`}
                                                ></div>
                                            )}

                                            {actStart && actEnd && (
                                                <div
                                                    className="absolute h-5 bottom-1.5 bg-yellow-600/40 border border-yellow-500/50 rounded flex flex-col justify-center overflow-hidden transition-all duration-300 shadow-inner"
                                                    style={{ left: `${actLeftPercent}%`, width: `${actWidthPercent}%` }}
                                                    title={`Real: ${(it.FechaInicio || it.fechaInicio)} a ${(it.FechaFin || it.fechaFin)} \nAvance: ${avance}%`}
                                                >
                                                    <div
                                                        className="absolute top-0 left-0 h-full bg-gradient-to-r from-yellow-400 to-yellow-500 transition-all duration-500"
                                                        style={{ width: `${avance}%` }}
                                                    ></div>
                                                    <span className="relative z-10 text-[10px] font-extrabold text-black px-2 drop-shadow-md truncate">
                                                        {avance}%
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const CrearCheckList = ({ onAtras, currentUser, currentRole, templateType, theme }) => {

            const [nombreChecklist, setNombreChecklist] = React.useState('');
            const [isSaving, setIsSaving] = React.useState(false);
            const [showAddItemForm, setShowAddItemForm] = React.useState(false);

            // Estados de inactivación y respaldo
            const [inactivatingItemId, setInactivatingItemId] = React.useState(null);
            const [inactivateReasonText, setInactivateReasonText] = React.useState('');
            const [backupItem, setBackupItem] = React.useState(null);

            // Estados para listados dinámicos de SharePoint (Gerencia, Superintendencia, Unidad de Proceso)
            const [acData, setAcData] = React.useState({ gerencias: [], superintendencias: [], unidades: [] });
            const [acLoading, setAcLoading] = React.useState(true);

            const openInactivateModal = (id) => {
                setInactivatingItemId(id);
                setInactivateReasonText('');
            };
            
            const getTipoFormulario = () => {
                if (templateType === 'proyectos') return 'PROYECTO';
                if (templateType === 'compra_instalada') return 'COMPRA INSTALADA';
                if (templateType === 'ensamble') return 'ENSAMBLE';
                return 'GENERAL';
            };

            const [metadata, setMetadata] = React.useState({
                equipos: [''],
                imagenesEquipo: [], // Guardar hasta 3 imágenes comprimidas
                roles: {
                    lider: { area: '', persona: '' },
                    custodio: { area: '', persona: '' },
                    operador: { area: '', persona: '' },
                    mantenedor: { area: '', persona: '' }
                },
                gerencia: '',
                superintendencia: '',
                unidadProceso: '',
                fechaInicioDiligenciamiento: new Date().toISOString().split('T')[0],
                fechaFinDiligenciamiento: 'Se completará al finalizar',
                comentarios: ''
            });

            const [items, setItems] = React.useState(() => {
                let sourceArray = [];
                if (templateType === 'proyectos') sourceArray = CHECKLIST_PROYECTOS_ITEMS;
                else if (templateType === 'compra_instalada') sourceArray = CHECKLIST_COMPRA_INSTALADA;
                else if (templateType === 'ensamble') sourceArray = CHECKLIST_EQUIPOS_NUEVOS_USADOS_ENSAMBLE;
                else sourceArray = PREDEFINED_ITEMS;

                const hoy = new Date().toISOString().split('T')[0];
                return sourceArray.map((act, idx) => ({
                    id: Date.now() + Math.random().toString(36).substr(2, 5) + idx,
                    actividades: act,
                    entregable: '',
                    nombreResponsable: '',
                    avance: '0',
                    fechaBaselineInicio: hoy,
                    fechaBaselineFin: '',
                    fechaInicio: hoy,
                    fechaFin: '',
                    isAlert: false,
                    estado: 'Activo',
                    inactivadoPor: '',
                    inactivadoRazon: '',
                    inactivadoFecha: ''
                }));
            });

            // Conexión dinámica a la lista EquiposAC
            React.useEffect(() => {
                const fetchAcList = async () => {
                    try {
                        const AC_SITE_URL = "https://glencore.sharepoint.com/sites/co-lmn-sgia/ac";
                        const res = await fetch(`${AC_SITE_URL}/_api/web/lists/getbytitle('EquiposAC')/items?$select=BranchGerencia,SiteSuperintendencia,UnidadProceso&$top=5000`, {
                            headers: { "Accept": "application/json;odata=verbose" },
                            credentials: 'same-origin'
                        });
                        const json = await res.json();
                        const results = json.d?.results || [];

                        const uniqueGerencias = [...new Set(results.map(r => r.BranchGerencia).filter(Boolean))].sort();
                        const uniqueSuperintendencias = [...new Set(results.map(r => r.SiteSuperintendencia).filter(Boolean))].sort();
                        const uniqueUnidades = [...new Set(results.map(r => r.UnidadProceso).filter(Boolean))].sort();

                        setAcData({
                            gerencias: uniqueGerencias,
                            superintendencias: uniqueSuperintendencias,
                            unidades: uniqueUnidades
                        });
                    } catch (err) {
                        console.error("Error fetching AC list:", err);
                    } finally {
                        setAcLoading(false);
                    }
                };
                fetchAcList();
            }, []);

            const [formData, setFormData] = React.useState({
                actividades: '', entregable: '', nombreResponsable: '', avance: '0',
                fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                fechaInicio: new Date().toISOString().split('T')[0], fechaFin: '',
            });

            const [editingId, setEditingId] = React.useState(null);

            const handleMetadataRoleChange = (roleKey, field, value) => {
                setMetadata(prev => ({
                    ...prev,
                    roles: { ...prev.roles, [roleKey]: { ...prev.roles[roleKey], [field]: value } }
                }));
            };

            const handleMetadataEquipoChange = (index, value) => {
                const newEquipos = [...metadata.equipos];
                newEquipos[index] = value;
                setMetadata(prev => ({ ...prev, equipos: newEquipos }));
            };

            const addEquipo = () => {
                setMetadata(prev => ({ ...prev, equipos: [...prev.equipos, ''] }));
            };

            const handleItemEdit = (id, field, value) => {
                setItems(prev => prev.map(it => it.id === id ? { ...it, [field]: value } : it));
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                const newItem = {
                    ...formData,
                    id: Date.now() + Math.random().toString(36).substr(2, 5),
                    estado: 'Activo',
                    inactivadoPor: '',
                    inactivadoRazon: '',
                    inactivadoFecha: ''
                };
                setItems([...items, newItem]);
                setFormData({
                    actividades: '', entregable: '', nombreResponsable: '', avance: '0',
                    fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                    fechaInicio: new Date().toISOString().split('T')[0], fechaFin: ''
                });
                setShowAddItemForm(false);
            };

            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                const currentImages = metadata.imagenesEquipo || [];
                if (currentImages.length >= 3) {
                    alert("M\u00e1ximo 3 fotos permitidas.");
                    return;
                }
                const spacesLeft = 3 - currentImages.length;
                const filesToProcess = files.slice(0, spacesLeft);

                const processed = [];
                for (let file of filesToProcess) {
                    try {
                        const base64 = await comprimirImagen(file, 600, 0.4);
                        processed.push(base64);
                    } catch (err) {
                        console.error("Error compressing image:", err);
                    }
                }
                setMetadata(prev => ({
                    ...prev,
                    imagenesEquipo: [...(prev.imagenesEquipo || []), ...processed]
                }));
            };

            const handleRemoveImage = (index) => {
                setMetadata(prev => ({
                    ...prev,
                    imagenesEquipo: (prev.imagenesEquipo || []).filter((_, i) => i !== index)
                }));
            };

            const handleConfirmInactivate = () => {
                if (!inactivateReasonText.trim()) {
                    alert('Por favor ingrese la razón de la inactivación.');
                    return;
                }
                setItems(prev => prev.map(it => it.id === inactivatingItemId ? {
                    ...it,
                    estado: 'Inactivo',
                    inactivadoPor: currentUser,
                    inactivadoRazon: inactivateReasonText.trim(),
                    inactivadoFecha: new Date().toISOString()
                } : it));
                setInactivatingItemId(null);
                setInactivateReasonText('');
            };

            const handleReactivarItem = (id) => {
                setItems(prev => prev.map(it => it.id === id ? {
                    ...it,
                    estado: 'Activo',
                    inactivadoPor: '',
                    inactivadoRazon: '',
                    inactivadoFecha: ''
                } : it));
            };

            const handleGuardarChecklist = async () => {
                if (!nombreChecklist.trim()) { alert('Ingresa el nombre del checklist.'); return; }
                if (items.length === 0) { alert('Agrega al menos un ítem.'); return; }

                setIsSaving(true);
                const newChecklistId = 'CHK-' + Date.now();

                try {
                    const digest = await getRequestDigest();
                    const finalItems = items.map((it) => ({
                        Id: it.id.toString(),
                        Descripcion: it.actividades,
                        NombreResponsable: it.nombreResponsable,
                        Entregable: it.entregable,
                        Avance: it.avance ? it.avance.toString() : "0",
                        FechaBaselineInicio: it.fechaBaselineInicio,
                        FechaBaselineFin: it.fechaBaselineFin,
                        FechaInicio: it.fechaInicio,
                        FechaFin: it.fechaFin,
                        Alerta: "No",
                        HistorialComentarios: [],
                        Estado: it.estado || "Activo",
                        InactivadoPor: it.inactivadoPor || "",
                        InactivadoRazon: it.inactivadoRazon || "",
                        InactivadoFecha: it.inactivadoFecha || ""
                    }));

                    const checklistData = {
                        ID_x002d_checklist: newChecklistId,
                        Name: nombreChecklist,
                        ComentarioGeneral: "",
                        Tipo: getTipoFormulario(),
                        Metadata: metadata,
                        items: finalItems
                    };

                    await saveToSPList('DB_CHECKLIST_APP', {
                        Title: newChecklistId,
                        Data: JSON.stringify(checklistData)
                    }, digest);

                    alert('Checklist guardado con éxito en SharePoint!');
                    onAtras();

                } catch (error) {
                    console.error("Error saving:", error);
                    alert("Ocurrió un error guardando en SharePoint. Verifica la consola.");
                } finally {
                    setIsSaving(false);
                }
            };

            // Estilos dinámicos según el tema
            const cardClass = theme === 'dark' 
                ? 'bg-slate-900 border-slate-800 text-slate-100 shadow-[0_0_20px_rgba(0,0,0,0.5)]' 
                : 'bg-white border-slate-200 text-slate-900 shadow-md shadow-slate-100';

            const inputClasses = theme === 'dark'
                ? "w-full bg-slate-950/80 text-white border border-slate-800 focus:border-yellow-400 rounded px-3 py-2 outline-none transition-all duration-300"
                : "w-full bg-slate-100/90 text-slate-900 border border-slate-300 focus:border-yellow-500 rounded px-3 py-2 outline-none transition-all duration-300";

            const tableBg = theme === 'dark' ? 'bg-slate-950/50' : 'bg-slate-50';

            let titlePrefix = templateType === 'proyectos' ? "Plantilla: Proyectos" : templateType === 'compra_instalada' ?
                "Plantilla: Compra Instalada" : templateType === 'ensamble' ? "Plantilla: Ensamble" : "Crear Nuevo Checklist";

            // Separar tareas activas e inactivas (Inactivas se mueven al fondo)
            const activas = items.filter(it => it.estado !== 'Inactivo');
            const inactivas = items.filter(it => it.estado === 'Inactivo');
            const listadoOrdenado = [...activas, ...inactivas];

            return (
                <div className={`${cardClass} border p-8 rounded-3xl mt-8 mx-auto max-w-[95%] animate-[fadeIn_0.3s_ease-out]`}>
                    <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
                        <h2 className={`text-2xl lg:text-3xl font-extrabold text-transparent bg-clip-text ${theme === 'dark' ? 'bg-gradient-to-r from-yellow-300 to-yellow-500' : 'bg-gradient-to-r from-amber-600 to-yellow-600'}`}>{titlePrefix}</h2>
                        <button className={`${theme === 'dark' ? 'bg-white/10 hover:bg-white/20 border-white/30 text-white' : 'bg-slate-100 hover:bg-slate-200 border-slate-300 text-slate-700'} border text-sm font-semibold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors shadow`} onClick={onAtras}>
                            <span>&larr;</span> {"Volver al Listado"}
                        </button>
                    </div>

                    <div className="mb-8">
                        <label className={`block text-sm font-semibold mb-2 ${theme === 'dark' ? 'text-yellow-400' : 'text-amber-700'}`}>{"Nombre del Checklist"}</label>
                        <input type="text" className={`${inputClasses} text-lg font-bold`} placeholder="Ej. Nuevo Proyecto" value={nombreChecklist} onChange={(e) => setNombreChecklist(e.target.value)} required />
                    </div>

                    <div className={`border rounded-lg overflow-hidden text-sm mb-8 ${theme === 'dark' ? 'border-slate-800 bg-slate-900/40' : 'border-slate-200 bg-white'}`}>
                        <div className={`flex flex-col md:flex-row border-b ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                            <div className={`w-full md:w-1/3 p-4 border-r flex flex-col gap-3 ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                <span className="font-bold text-[10px] uppercase tracking-wider text-slate-500">{"DESCRIPCI\u00d3N DE EQUIPO(S) A INCORPORAR"}</span>
                                {metadata.equipos.map((eq, idx) => (
                                    <div key={idx} className="relative group w-full flex items-center">
                                        <textarea 
                                            className={`${inputClasses} text-xs pr-14`} 
                                            placeholder={"Describe aqu\u00ed un equipo a incorporar..."} 
                                            rows="2" 
                                            value={eq} 
                                            onChange={(e) => handleMetadataEquipoChange(idx, e.target.value)}
                                        />
                                        {idx > 0 && (
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    const newEquipos = metadata.equipos.filter((_, i) => i !== idx);
                                                    setMetadata(prev => ({ ...prev, equipos: newEquipos }));
                                                }}
                                                className="absolute right-2 px-2 py-1 text-red-500 hover:text-red-400 font-bold text-xs bg-slate-950/20 rounded border border-red-500/20"
                                            >
                                                {"Eliminar"}

                                        )}
                                    </div>
                                ))}
                                <button onClick={addEquipo} className="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold py-1.5 px-3 rounded self-start transition-colors border border-amber-500/20 shadow">{"A\u00f1adir otro activo"}</button>

                                <div className={`mt-3 pt-3 border-t ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                    <span className="font-bold text-[10px] uppercase tracking-wider text-slate-500 block mb-2">{"FOTO DEL EQUIPO (M\u00c1X. 3)"}</span>
                                    <div className="flex flex-wrap gap-2 mb-2">
                                        {(metadata.imagenesEquipo || []).map((img, i) => (
                                            <div key={i} className="relative inline-block">
                                                <img src={img} alt="Preview" className="h-16 w-16 rounded border border-slate-300 dark:border-slate-700 object-cover shadow" />
                                                <button 
                                                    type="button"
                                                    onClick={() => handleRemoveImage(i)} 
                                                    className="absolute -top-1.5 -right-1.5 bg-red-600 hover:bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold shadow-lg"
                                                >
                                                    &times;
                                                </button>
                                            </div>
                                        ))}

                const fetchDetails = async () => {
                    try {
                        const listRes = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('DB_CHECKLIST_APP')/items?$filter=Title eq '${checklistId}'`, {
                            headers: { "Accept": "application/json;odata=verbose" }, credentials: "same-origin"
                        });
                        const listJson = await listRes.json();

                        if (listJson.d.results.length > 0) {
                            const row = listJson.d.results[0];
                            const parsedData = JSON.parse(row.Data);
                            setChecklist({ ...parsedData, SharePointId: row.Id });
                            setGeneralComment(parsedData.ComentarioGeneral || '');
                        }
                    } catch (error) {
                        console.error("Error loading details:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchDetails();
            }, [checklistId]);

            const cargarEvidencias = async (itemId) => {
                setCargandoEvidencias(prev => ({ ...prev, [itemId]: true }));
                try {
                    const res = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('EvidenciasChecklist')/items?$filter=ID_Registro eq '${itemId}'&$select=Id,Data,Title`, {
                        headers: { "Accept": "application/json;odata=verbose" }, credentials: "same-origin"
                    });
                    const json = await res.json();
                    setEvidenciasItem(prev => ({ ...prev, [itemId]: json.d.results }));
                } catch (error) {
                    console.error("Error cargando evidencias", error);
                }
                setCargandoEvidencias(prev => ({ ...prev, [itemId]: false }));
            };

            const handleFileUpload = async (itemId, e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setIsUploading(true);
                try {
                    const digest = await getRequestDigest();
                    for (let file of files) {
                        let base64Data = "";

                        if (file.type.startsWith('image/')) {
                            base64Data = await comprimirImagen(file, 1024, 0.6);
                        } else {
                            const maxSize = 2 * 1024 * 1024;
                            if (file.size > maxSize) {
                                alert(`El archivo "${file.name}" supera el límite de 2MB. SharePoint no puede procesar documentos de texto tan pesados por esta vía.`);
                                continue;
                            }
                            base64Data = await fileToBase64(file);
                        }

                        if (base64Data) {
                            await saveToSPList('EvidenciasChecklist', {
                                Title: `Evidencia_${itemId}_${Date.now()}`,
                                ID_Registro: itemId.toString(),
                                Data: base64Data
                            }, digest);
                        }
                    }

                    alert('Proceso de carga finalizado.');
                    await cargarEvidencias(itemId);
                } catch (error) {
                    alert('Error subiendo evidencia. Revisa la consola.');
                    console.error(error);
                } finally {
                    setIsUploading(false);
                }
            };

            const eliminarEvidencia = async (itemId, evidenciaId) => {
                if (!window.confirm("¿Seguro que deseas eliminar esta evidencia?")) return;
                try {
                    const digest = await getRequestDigest();
                    await deleteSPListItem('EvidenciasChecklist', evidenciaId, digest);
                    await cargarEvidencias(itemId);
                } catch (error) {
                    console.error("Error eliminando evidencia", error);
                    alert("Fallo al eliminar.");
                }
            };

            const handleStartEdit = (item) => {
                setEditingId(item.Id);
                setEditForm({ ...item });
            };

            const handleSaveEdit = async () => {
                const tieneEvidenciasCargadas = evidenciasItem[editForm.Id] && evidenciasItem[editForm.Id].length > 0;
                if (parseInt(editForm.Avance) >= 100 && !tieneEvidenciasCargadas) {
                    alert("⚠ Error: No puedes guardar el avance al 100% sin antes haber cargado al menos una evidencia y validado dando click en 'Cargar/Actualizar Vista'.");
                    return;
                }

                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === editForm.Id ? {
                        ...it,
                        Descripcion: editForm.Descripcion,
                        NombreResponsable: editForm.NombreResponsable,
                        Entregable: editForm.Entregable,
                        FechaInicio: editForm.FechaInicio,
                        FechaFin: editForm.FechaFin,
                        Avance: editForm.Avance ? editForm.Avance.toString() : "0",
                        Alerta: editForm.Alerta || "No"
                    } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    setEditingId(null);
                } catch (error) {
                    alert("Error guardando cambios. Revisa la consola.");
                    console.error(error);
                }
            };

            const openInactivateModal = (itemId) => {
                setInactivatingItemId(itemId);
                setInactivateReasonText('');
            };

            const handleConfirmInactivate = async () => {
                if (!inactivateReasonText.trim()) {
                    alert('Por favor ingrese la razón de la inactivación.');
                    return;
                }
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === inactivatingItemId ? {
                        ...it,
                        Estado: 'Inactivo',
                        InactivadoPor: currentUser,
                        InactivadoRazon: inactivateReasonText.trim(),
                        InactivadoFecha: new Date().toISOString()
                    } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    setInactivatingItemId(null);
                    setInactivateReasonText('');
                } catch (error) {
                    alert("Error inactivando el item en SharePoint.");
                    console.error(error);
                }
            };

            const handleReactivarItem = async (itemId) => {
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === itemId ? {
                        ...it,
                        Estado: 'Activo',
                        InactivadoPor: '',
                        InactivadoRazon: '',
                        InactivadoFecha: ''
                    } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                } catch (error) {
                    alert("Error reactivando el item.");
                    console.error(error);
                }
            };

            const handleAgregarComentario = async (itemId) => {
                const text = nuevosComentarios[itemId];
                if (!text || !text.trim()) return;

                const comentarioObj = {
                    texto: text.trim(),
                    autor: currentUser,
                    fecha: new Date().toISOString(),
                };
                try {
                    const digest = await getRequestDigest();
                    let targetItem = null;
                    const updatedItems = checklist.items.map(it => {
                        if (it.Id === itemId) {
                            targetItem = it;
                            const history = it.HistorialComentarios || [];
                            return { ...it, HistorialComentarios: [...history, comentarioObj] };
                        }
                        return it;
                    });

                    const updatedChecklist = { ...checklist, items: updatedItems };
                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);

                    setChecklist(updatedChecklist);
                    setNuevosComentarios({ ...nuevosComentarios, [itemId]: '' });

                    if (targetItem && targetItem.NombreResponsable && targetItem.NombreResponsable.toLowerCase() !== currentUser.toLowerCase()) {
                        notificarTeams(
                            "Nuevo Comentario",
                            targetItem.NombreResponsable,
                            `El usuario ${currentUser} ha comentado en tu tarea "${targetItem.Descripcion}": ${text}`,
                            checklist.Name
                        );
                    }

                } catch (error) {
                    console.error(error);
                    alert("Error guardando el comentario.");
                }
            };

            const handleSaveGeneralComment = async () => {
                try {
                    const digest = await getRequestDigest();
                    const updatedChecklist = { ...checklist, ComentarioGeneral: generalComment };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    alert("Comentario general guardado exitosamente.");
                } catch (error) {
                    console.error(error);
                    alert("Error guardando el comentario general.");
                }
            };

            const toggleAlert = async (item) => {
                const newAlerta = item.Alerta === "Si" ? "No" : "Si";
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === item.Id ? { ...it, Alerta: newAlerta } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);

                    if (newAlerta === "Si" && item.NombreResponsable && item.NombreResponsable.toLowerCase() !== currentUser.toLowerCase()) {
                        notificarTeams(
                            "Alerta Activada",
                            item.NombreResponsable,
                            `El usuario ${currentUser} ha marcado una alerta en tu tarea: "${item.Descripcion}".`,
                            checklist.Name
                        );
                    }
                } catch (error) { console.error(error); }
            };

            // AGREGAR NUEVAS TAREAS DINÁMICAMENTE A LA BD
            const handleSaveNewTask = async (e) => {
                e.preventDefault();
                if (!newTaskData.actividades.trim()) {
                    alert("Por favor configure la descripci\u00f3n de la tarea.");
                    return;
                }
                try {
                    const digest = await getRequestDigest();
                    const nuevaTareaId = "TASK-" + Date.now() + Math.random().toString(36).substr(2, 5);
                    const hoy = new Date().toISOString().split('T')[0];

                    const nuevaTareaObj = {
                        Id: nuevaTareaId,
                        Descripcion: newTaskData.actividades,
                        NombreResponsable: newTaskData.nombreResponsable,
                        Entregable: newTaskData.entregable,
                        Avance: "0",
                        FechaBaselineInicio: newTaskData.fechaBaselineInicio,
                        FechaBaselineFin: newTaskData.fechaBaselineFin || newTaskData.fechaBaselineInicio,
                        FechaInicio: hoy,
                        FechaFin: '',
                        Alerta: "No",
                        HistorialComentarios: [],
                        Estado: "Activo",
                        InactivadoPor: '',
                        InactivadoRazon: '',
                        InactivadoFecha: ''
                    };

                    const updatedItems = [...checklist.items, nuevaTareaObj];
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);

                    setChecklist(updatedChecklist);
                    setShowAddTaskForm(false);
                    setNewTaskData({
                        actividades: '',
                        entregable: '',
                        nombreResponsable: '',
                        fechaBaselineInicio: new Date().toISOString().split('T')[0],
                        fechaBaselineFin: ''
                    });
                    alert("Nueva tarea agregada correctamente.");
                } catch (error) {
                    console.error("Error adding task:", error);
                    alert("Error agregando la tarea.");
                }
            };

            if (loading) return <div className="text-center text-white mt-20">Cargando detalles desde SharePoint...</div>;
            if (!checklist) return <div className="text-center text-white mt-20">Checklist no encontrado.</div>;

            const activas = checklist.items.filter(it => (it.Estado || it.estado) !== 'Inactivo');
            const inactivas = checklist.items.filter(it => (it.Estado || it.estado) === 'Inactivo');
            const listadoOrdenado = [...activas, ...inactivas];

            // Listado de responsables para filtros
            const listadoResponsablesUnicos = [...new Set(checklist.items.map(it => it.NombreResponsable).filter(Boolean))].sort();

            // Filtrado del listado ordenado
            let itemsFiltrados = listadoOrdenado;
            if (filterResponsable) {
                itemsFiltrados = itemsFiltrados.filter(it => it.NombreResponsable === filterResponsable);
            }
            if (filterAlertaOnly) {
                itemsFiltrados = itemsFiltrados.filter(it => it.Alerta === 'Si');
            }

            return (
                <div className="max-w-[95%] mx-auto animate-[fadeIn_0.3s_ease-out]">
                    <div className={`${cardClass} border p-6 rounded-3xl mb-6 flex justify-between items-center`}>
                        <div>
                            <h2 className="text-3xl font-extrabold mb-1"><span className={theme==='dark' ? 'text-yellow-400' : 'text-amber-600'}>{"Checklist:"}</span> {checklist.Name}</h2>
                        </div>
                        <button className={`${theme === 'dark' ? 'bg-white/10 hover:bg-white/20 border-white/30 text-white' : 'bg-slate-100 hover:bg-slate-200 border-slate-300 text-slate-700'} border py-2 px-4 rounded-lg flex items-center gap-2 font-semibold transition-colors`} onClick={onAtras}>
                            &larr; {"Volver"}
                        </button>
                    </div>

                    {checklist.Metadata && (
                        <div className={`border rounded-2xl overflow-hidden text-sm mb-8 shadow-lg ${theme === 'dark' ? 'border-slate-800 bg-slate-900/60' : 'border-slate-200 bg-white'}`}>
                            <div className={`flex flex-col md:flex-row border-b ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                <div className={`w-full md:w-1/3 p-5 border-r flex flex-col gap-2 ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                    <span className="font-extrabold text-[10px] uppercase tracking-widest text-slate-500 mb-2">DESCRIPCIÓN DE EQUIPO(S) A INCORPORAR</span>
                                    {checklist.Metadata.equipos.map((eq, idx) => (
                                        <div key={idx} className={`p-3 rounded-lg border text-xs whitespace-pre-wrap ${theme === 'dark' ? 'bg-slate-950/40 border-slate-800 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-750'}`}>{eq || '-'}</div>
                                    ))}
                                    {/* Mostrar hasta 3 fotos guardadas en el detalle */}
                                    {((checklist.Metadata.imagenesEquipo && checklist.Metadata.imagenesEquipo.length > 0) || checklist.Metadata.imagenEquipo) && (
                                        <div className={`mt-3 pt-3 border-t ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                            <span className="font-bold text-[10px] uppercase tracking-wider text-slate-500 block mb-2">FOTOS DEL EQUIPO</span>
                                            <div className="flex flex-wrap gap-2">
                                                {checklist.Metadata.imagenesEquipo ? (
                                                    checklist.Metadata.imagenesEquipo.map((img, idx) => (
                                                        <img key={idx} src={img} alt="Equipo" className="max-h-24 rounded-lg border border-slate-300 dark:border-slate-700 object-cover shadow-lg" />
                                                    ))
                                                ) : (
                                                    <img src={checklist.Metadata.imagenEquipo} alt="Equipo" className="max-h-24 rounded-lg border border-slate-300 dark:border-slate-700 object-cover shadow-lg" />
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="w-full md:w-2/3 flex flex-col">
                                    <div className={`grid grid-cols-12 border-b font-bold text-[10px] uppercase tracking-wider text-slate-500 ${theme === 'dark' ? 'border-slate-800 bg-slate-950/40' : 'border-slate-200 bg-slate-100/80'}`}>
                                        <div className={`col-span-3 p-3 border-r ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'} flex items-center`}>ROL</div>
                                        <div className={`col-span-4 p-3 border-r ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'} flex items-center`}>Área</div>
                                        <div className="col-span-5 p-3 flex items-center">Nombre representante</div>
                                    </div>
                                    {['lider', 'custodio', 'operador', 'mantenedor'].map((roleKey) => (
                                        <div key={roleKey} className={`grid grid-cols-12 border-b items-stretch ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                                            <div className={`col-span-3 p-3 border-r font-bold text-[10px] uppercase flex items-center ${theme === 'dark' ? 'border-slate-800 bg-slate-950/20 text-yellow-100' : 'border-slate-200 bg-slate-100/50 text-slate-700'}`}>
                                                {roleKey === 'lider' ? 'L\u00cdDER DE PROYECTO' : roleKey}
                                            </div>
                                            <div className={`col-span-4 p-3 border-r ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'} flex items-center text-xs`}>
                                                {checklist.Metadata.roles[roleKey].area || '-'}
                                            </div>
                                            <div className="col-span-5 p-3 flex items-center gap-3">
                                                {checklist.Metadata.roles[roleKey].persona ? (
                                                    <React.Fragment>
                                                        <img src={`https://glencore.sharepoint.com/_layouts/15/userphoto.aspx?size=S&accountname=${checklist.Metadata.roles[roleKey].persona}`} className="w-6 h-6 rounded-full border border-slate-300 dark:border-slate-700 object-cover bg-gray-700" onError={(e) => { e.target.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23ccc' viewBox='0 0 24 24'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }} />
                                                        <span className="text-xs font-semibold truncate" title={checklist.Metadata.roles[roleKey].persona}>{checklist.Metadata.roles[roleKey].persona}</span>
                                                    </React.Fragment>
                                                ) : <span className="text-slate-400 text-xs italic">-</span>}
                                            </div>
                                        </div>
                                    ))}

                                    {/* MUESTRA DE SELECTS DINÁMICOS EN EL DETALLE */}
                                    <div className={`grid grid-cols-12 border-b items-stretch ${theme === 'dark' ? 'border-slate-800 bg-slate-950/20' : 'border-slate-200 bg-slate-100/50'}`}>
                                        <div className={`col-span-3 p-3 border-r font-bold text-[10px] uppercase flex items-center ${theme === 'dark' ? 'border-slate-800 text-yellow-100' : 'border-slate-200 text-slate-700'}`}>GERENCIA</div>
                                        <div className="col-span-9 p-3 flex items-center text-xs font-semibold">{checklist.Metadata?.gerencia || '-'}</div>
                                    </div>
                                    <div className={`grid grid-cols-12 border-b items-stretch ${theme === 'dark' ? 'border-slate-800 bg-slate-950/20' : 'border-slate-200 bg-slate-100/50'}`}>
                                        <div className={`col-span-3 p-3 border-r font-bold text-[10px] uppercase flex items-center ${theme === 'dark' ? 'border-slate-800 text-yellow-100' : 'border-slate-200 text-slate-700'}`}>SUPERINTENDENCIA</div>
                                        <div className="col-span-9 p-3 flex items-center text-xs font-semibold">{checklist.Metadata?.superintendencia || '-'}</div>
                                    </div>
                                    <div className={`grid grid-cols-12 items-stretch ${theme === 'dark' ? 'border-slate-800 bg-slate-950/20' : 'border-slate-200 bg-slate-100/50'}`}>
                                        <div className={`col-span-3 p-3 border-r font-bold text-[10px] uppercase flex items-center ${theme === 'dark' ? 'border-slate-800 text-yellow-100' : 'border-slate-200 text-slate-700'}`}>UNIDAD DE PROCESO</div>
                                        <div className="col-span-9 p-3 flex items-center text-xs font-semibold">{checklist.Metadata?.unidadProceso || '-'}</div>
                                    </div>
                                </div>
                            </div>
                            <div className={`flex flex-col md:flex-row ${theme === 'dark' ? 'bg-black/25' : 'bg-slate-100/30'}`}>
                                <div className={`w-full md:w-1/3 flex border-b md:border-b-0 ${theme==='dark'?'border-slate-800':'border-slate-200'}`}>
                                    <div className={`w-1/2 p-3 font-bold text-[10px] uppercase flex flex-col justify-center border-r text-slate-400 dark:text-slate-500 ${theme==='dark'?'border-slate-800':'border-slate-200'}`}>Inicio Diligenciamiento <span className="text-slate-700 dark:text-slate-300 text-xs mt-1 font-semibold">{checklist.Metadata.fechaInicioDiligenciamiento || '-'}</span></div>
                                    <div className={`w-1/2 p-3 font-bold text-[10px] uppercase flex flex-col justify-center border-r text-slate-400 dark:text-slate-500 ${theme==='dark'?'border-slate-800':'border-slate-200'}`}>Fin Diligenciamiento <span className="text-slate-700 dark:text-slate-300 text-xs mt-1 font-semibold">{checklist.Metadata.fechaFinDiligenciamiento || '-'}</span></div>
                                </div>
                                <div className="w-full md:w-2/3 flex">
                                    <div className="w-full p-4 text-xs">
                                        <span className="font-bold text-[10px] uppercase text-slate-400 dark:text-slate-500 block mb-1">Comentarios Generales Metadatos:</span>
                                        <span className="text-slate-600 dark:text-slate-300 whitespace-pre-wrap font-semibold">{checklist.Metadata.comentarios || '-'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SECCIÓN DE FILTROS EN VISTA DETALLE */}
                    <div className={`${cardClass} border p-5 rounded-2xl mb-6 flex flex-col md:flex-row gap-4 items-center justify-between`}>
                        <div className="flex flex-col md:flex-row gap-4 flex-1 w-full">
                            <div className="flex flex-col w-full md:w-1/3">
                                <span className="text-[10px] uppercase font-bold text-slate-500 mb-1">{"Filtrar por Responsable"}</span>
                                <select className={`${inputClasses} text-xs font-semibold`} value={filterResponsable} onChange={(e) => setFilterResponsable(e.target.value)}>
                                    <option value="">{"Todos los Responsables"}</option>
                                    {listadoResponsablesUnicos.map(r => <option key={r} value={r}>{r}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center gap-2 mt-4 md:mt-0">
                                <input type="checkbox" id="detAlertCheckbox" checked={filterAlertaOnly} onChange={(e) => setFilterAlertaOnly(e.target.checked)} className="accent-yellow-500 cursor-pointer h-4 w-4" />
                                <label htmlFor="detAlertCheckbox" className="text-xs font-bold text-slate-600 dark:text-slate-300 cursor-pointer">{"Mostrar solo tareas en Alerta"}</label>
                            </div>
                        </div>
                        {isAdmin && (
                            <button onClick={() => setShowAddTaskForm(!showAddTaskForm)} className="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2.5 rounded-lg border border-blue-400/40 transition-colors shadow">
                                {showAddTaskForm ? "Cancelar Nueva" : "Agregar Nueva Tarea"}
                            </button>
                        )}
                    </div>

                    {/* FORMULARIO DINÁMICO PARA AGREGAR NUEVAS TAREAS */}
                    {showAddTaskForm && (
                        <div className={`${theme === 'dark' ? 'bg-slate-900 border-blue-500/30' : 'bg-white border-blue-200 shadow-slate-200'} p-6 rounded-2xl border mb-6 animate-[fadeIn_0.2s_ease-out] shadow`}>
                            <form onSubmit={handleSaveNewTask} className="space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                    <div className="md:col-span-12">
                                        <label className={`block text-xs font-bold mb-1 ${theme === 'dark' ? 'text-slate-300' : 'text-slate-600'}`}>{"Descripción de la Tarea"}</label>
                                        <textarea className={inputClasses + " text-xs"} value={newTaskData.actividades} onChange={(e) => setNewTaskData({ ...newTaskData, actividades: e.target.value })} rows="2" required></textarea>
                                    </div>
                                    <div className="md:col-span-4">
                                        <label className={`block text-xs font-bold mb-1 ${theme === 'dark' ? 'text-slate-300' : 'text-slate-600'}`}>Responsable</label>
                                        <PeoplePicker className={inputClasses + " text-xs"} value={newTaskData.nombreResponsable} onChange={(val) => setNewTaskData(prev => ({ ...prev, nombreResponsable: val }))} />
                                    </div>
