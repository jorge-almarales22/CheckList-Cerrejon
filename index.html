                        </div>
                        {error && <div className="bg-red-500/20 border border-red-500/50 text-red-100 px-4 py-3 rounded-xl mb-6 shadow-inner flex items-center gap-3 animate-pulse"><span>&#9888;</span><span className="text-sm font-medium">{error}</span></div>}
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div className="relative">
                                <input type="text" className={inputClasses} id="inputUser" placeholder="Usuario" value={user} onChange={(e) => setUser(e.target.value)} required disabled={isLoading} />
                                <label htmlFor="inputUser" className="absolute left-4 -top-2.5 bg-gray-800/90 px-2 text-xs text-yellow-400 font-semibold rounded backdrop-blur-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-3.5 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-yellow-400 peer-focus:bg-gray-800/90">Usuario</label>
                            </div>
                            <div className="relative">
                                <input type="password" className={inputClasses} id="inputPswd" placeholder="Contrase\u00f1a" value={pswd} onChange={(e) => setPswd(e.target.value)} required disabled={isLoading} />
                                <label htmlFor="inputPswd" className="absolute left-4 -top-2.5 bg-gray-800/90 px-2 text-xs text-yellow-400 font-semibold rounded backdrop-blur-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-3.5 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-yellow-400 peer-focus:bg-gray-800/90">Contrase&ntilde;a</label>
                            </div>
                            <button className={`w-full mt-8 bg-gradient-to-r from-yellow-400 to-yellow-500 text-black font-extrabold py-3.5 rounded-xl shadow-[0_0_20px_rgba(234,179,8,0.3)] transition-all duration-300 ${isLoading ? 'opacity-70 cursor-not-allowed' : 'hover:-translate-y-1'}`} type="submit" disabled={isLoading}>
                                {isLoading ? 'VERIFICANDO...' : 'INGRESAR AL SISTEMA'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, role, onLogout }) => {
            const [view, setView] = React.useState('checklist_all');
            const [selectedChecklistId, setSelectedChecklistId] = React.useState(null);

            const handleNavigate = (newView, id = null) => {
                setView(newView);
                setSelectedChecklistId(id);
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden text-white pattern-bg">
                    <nav className="bg-black/80 backdrop-blur-2xl border-b border-white/10 px-6 py-4 shadow-[0_5px_30px_rgba(0,0,0,0.5)] sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => handleNavigate('home')}>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-black font-black text-xl shadow-lg group-hover:rotate-12 transition-transform duration-300">C</div>
                                <span className="text-xl font-bold text-white tracking-wide group-hover:text-yellow-400 transition-colors">Gesti&oacute;n Cerrej&oacute;n</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <button className="text-sm font-semibold hover:text-yellow-400 transition-colors hidden md:block" onClick={() => handleNavigate('checklist_all')}>Listar Checklists</button>
                                <div className="hidden md:block flex-col text-right ml-4">
                                    <span className="text-white/60 text-[10px] font-semibold uppercase tracking-wider block leading-tight">Usuario Activo</span>
                                    <span className="text-white font-bold block text-sm">{user} <span className="text-yellow-400 text-xs bg-yellow-400/10 px-2 py-0.5 rounded-full ml-1 border border-yellow-400/20">{role}</span></span>
                                </div>
                                <div className="h-8 w-px bg-white/20 hidden md:block"></div>
                                <button className="text-white/80 hover:text-red-400 font-semibold text-sm py-2 px-3 rounded-lg hover:bg-red-400/10" onClick={onLogout}>Cerrar Sesi&oacute;n</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8">
                        {view === 'home' && (
                            <div className="max-w-7xl mx-auto flex flex-col items-center justify-center mt-8 md:mt-16 animate-[fadeIn_0.5s_ease-out]">
                                <div className="bg-black/80 backdrop-blur-2xl border border-white/20 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] text-center max-w-2xl w-full">
                                    <h1 className="text-4xl font-extrabold text-white mb-4 tracking-tight">&iexcl;Bienvenido al portal!</h1>
                                    <button onClick={() => handleNavigate('checklist_all')} className="bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold py-3.5 px-8 rounded-xl transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)] hover:shadow-[0_0_30px_rgba(234,179,8,0.5)]">
                                        Ir al Panel de Checklists &rarr;
                                    </button>
                                </div>
                            </div>
                        )}
                        {view === 'checklist_all' && <CheckListAll onView={handleNavigate} role={role} currentUser={user} />}
                        {view === 'crear_checklist' && <CrearCheckList currentUser={user} currentRole={role} templateType={selectedChecklistId} onAtras={() => handleNavigate('checklist_all')} />}
                        {view === 'checklist_detalle' && <CheckListDetalle checklistId={selectedChecklistId} role={role} currentUser={user} onAtras={() => handleNavigate('checklist_all')} />}
                    </main>

                    <style dangerouslySetInnerHTML={{ __html: `
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
                    `}} />
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [currentUser, setCurrentUser] = React.useState('');
            const [currentRole, setCurrentRole] = React.useState('');
            
            const handleLogin = (user, role) => { setIsLoggedIn(true); setCurrentUser(user); setCurrentRole(role); };
            const handleLogout = () => { setIsLoggedIn(false); setCurrentUser(''); setCurrentRole(''); };
            
            return isLoggedIn ? <Dashboard user={currentUser} role={currentRole} onLogout={handleLogout} /> : <Login onLogin={handleLogin} />;
        };

        const rootContainer = document.getElementById('root');
        if (rootContainer) { const root = ReactDOM.createRoot(rootContainer); root.render(<App />); }
    </script>
</body>
</html>
