<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App React en SharePoint</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('./img/img-background.png'); /* fallback if local doesn't exist just gray */
            background-color: #1a202c; /* dark fallback */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5); 
        }

        /* Prevent form autofill background change in WebKit */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.9) inset !important;
            -webkit-text-fill-color: #1f2937 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel" data-presets="react">

        const PERMISOS = {
            "Administrador": ["control_total", "ver_checklist_productivos", "gestionar_items_productivos", "ver_avances", "ver_checklist_desarrollo", "gestionar_checklist_desarrollo"],
            "Responsable": ["ver_checklist_productivos", "gestionar_items_productivos", "ver_avances"],
            "Desarrollador": ["ver_checklist_desarrollo", "gestionar_checklist_desarrollo"]
        };

        const tienePermiso = (rol, permiso) => {
            if (rol === "Administrador") return true;
            return PERMISOS[rol] ? PERMISOS[rol].includes(permiso) : false;
        };

        const CrearCheckList = ({ onAtras }) => {
            const [formData, setFormData] = React.useState({
                actividades: '',
                rolResponsable: '',
                entregable: '',
                nombreResponsable: '',
                avance: '',
                fechaPlaneada: '',
                fechaReal: '',
                comentarios: ''
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const checklists = JSON.parse(localStorage.getItem('checklists_data')) || [];
                checklists.push({ ...formData, id: Date.now() });
                localStorage.setItem('checklists_data', JSON.stringify(checklists));
                alert('CheckList creado con éxito.');
                setFormData({
                    actividades: '', rolResponsable: '', entregable: '',
                    nombreResponsable: '', avance: '', fechaPlaneada: '',
                    fechaReal: '', comentarios: ''
                });
            };

            const inputClasses = "w-full bg-white/90 text-gray-900 border border-transparent focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 rounded-lg px-4 py-2.5 outline-none transition-all duration-300";
            const labelClasses = "block text-sm font-semibold text-white/90 mb-1.5";

            return (
                <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl text-white mt-8 mx-auto max-w-4xl transform transition-all duration-500 hover:shadow-yellow-500/10">
                    <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/20">
                        <h2 className="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 to-yellow-500">Crear CheckList</h2>
                        <button 
                            className="bg-white/10 hover:bg-white/20 border border-white/30 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-all duration-300 flex items-center gap-2" 
                            onClick={onAtras}
                        >
                            <span>&larr;</span> Volver al Inicio
                        </button>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-5 text-left">
                            <div className="md:col-span-12">
                                <label className={labelClasses}>Actividades</label>
                                <textarea className={inputClasses} name="actividades" value={formData.actividades} onChange={handleChange} rows="2" required></textarea>
                            </div>
                            <div className="md:col-span-6">
                                <label className={labelClasses}>Rol Responsable</label>
                                <select className={inputClasses} name="rolResponsable" value={formData.rolResponsable} onChange={handleChange} required>
                                    <option value="" className="text-gray-500">Seleccione un rol...</option>
                                    <option value="Administrador" className="text-black">Administrador</option>
                                    <option value="Responsable" className="text-black">Responsable</option>
                                    <option value="Desarrollador" className="text-black">Desarrollador</option>
                                </select>
                            </div>
                            <div className="md:col-span-6">
                                <label className={labelClasses}>Nombre Responsable</label>
                                <input type="text" className={inputClasses} name="nombreResponsable" value={formData.nombreResponsable} onChange={handleChange} required />
                            </div>
                            <div className="md:col-span-12">
                                <label className={labelClasses}>Entregable</label>
                                <input type="text" className={inputClasses} name="entregable" value={formData.entregable} onChange={handleChange} required />
                            </div>
                            <div className="md:col-span-4">
                                <label className={labelClasses}>Avance (%)</label>
                                <input type="number" min="0" max="100" className={inputClasses} name="avance" value={formData.avance} onChange={handleChange} required />
                            </div>
                            <div className="md:col-span-4">
                                <label className={labelClasses}>Fecha Planeada</label>
                                <input type="date" className={inputClasses} name="fechaPlaneada" value={formData.fechaPlaneada} onChange={handleChange} required />
                            </div>
                            <div className="md:col-span-4">
                                <label className={labelClasses}>Fecha Real</label>
                                <input type="date" className={inputClasses} name="fechaReal" value={formData.fechaReal} onChange={handleChange} />
                            </div>
                            <div className="md:col-span-12">
                                <label className={labelClasses}>Comentarios</label>
                                <textarea className={inputClasses} name="comentarios" value={formData.comentarios} onChange={handleChange} rows="3"></textarea>
                            </div>
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 hover:from-yellow-500 hover:to-yellow-700 text-gray-900 font-extrabold text-lg py-3.5 rounded-xl shadow-[0_0_15px_rgba(234,179,8,0.4)] hover:shadow-[0_0_25px_rgba(234,179,8,0.6)] transform hover:-translate-y-0.5 transition-all duration-300 mt-4">
                            GUARDAR CHECKLIST
                        </button>
                    </form>
                </div>
            );
        };

        const Login = ({ onLogin }) => {
            const [user, setUser] = React.useState('');
            const [pswd, setPswd] = React.useState('');
            const [error, setError] = React.useState('');
            const [role, setRole] = React.useState('Administrador');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                const storedData = localStorage.getItem('userCerrejon');
                if (!storedData) {
                    setError('No se encontraron credenciales en el sistema local. Por favor crea el item "userCerrejon" en localStorage.');
                    return;
                }

                try {
                    const credentials = JSON.parse(storedData);
                    if (credentials.user === user && credentials.pswd === pswd) {
                        onLogin(user, credentials.role || role);
                    } else {
                        setError('Usuario o contraseña incorrectos.');
                    }
                } catch (err) {
                    setError('Error al leer la base de datos local.');
                }
            };

            const inputClasses = "w-full bg-white/90 text-gray-900 border border-transparent focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 rounded-xl px-4 py-3 outline-none transition-all duration-300 placeholder-transparent peer";
            
            return (
                <div className="flex justify-center items-center min-h-screen p-4">
                    <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-10 rounded-[2rem] shadow-[0_8px_32px_rgba(0,0,0,0.37)] w-full max-w-md transform transition-all hover:scale-[1.01]">
                        <div className="text-center mb-8">
                            <h2 className="text-4xl font-black text-white tracking-tight drop-shadow-md">Cerrejón</h2>
                            <p className="text-yellow-400/90 font-medium mt-1 uppercase tracking-widest text-sm">Plataforma de Operaciones</p>
                        </div>

                        {error && (
                            <div className="bg-red-500/20 border border-red-500/50 backdrop-blur-md text-red-100 px-4 py-3 rounded-xl mb-6 shadow-inner flex items-center gap-3 animate-pulse">
                                <span>⚠️</span>
                                <span className="text-sm font-medium">{error}</span>
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div className="relative">
                                <input
                                    type="text"
                                    className={inputClasses}
                                    id="inputUser"
                                    placeholder="Usuario"
                                    value={user}
                                    onChange={(e) => setUser(e.target.value)}
                                    required
                                />
                                <label htmlFor="inputUser" className="absolute left-4 -top-2.5 bg-gray-800/90 px-2 text-xs text-yellow-400 font-semibold rounded backdrop-blur-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-3.5 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-yellow-400 peer-focus:bg-gray-800/90">Usuario</label>
                            </div>
                            
                            <div className="relative">
                                <input
                                    type="password"
                                    className={inputClasses}
                                    id="inputPswd"
                                    placeholder="Contraseña"
                                    value={pswd}
                                    onChange={(e) => setPswd(e.target.value)}
                                    required
                                />
                                <label htmlFor="inputPswd" className="absolute left-4 -top-2.5 bg-gray-800/90 px-2 text-xs text-yellow-400 font-semibold rounded backdrop-blur-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-3.5 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-yellow-400 peer-focus:bg-gray-800/90">Contraseña</label>
                            </div>

                            <div className="relative pt-2">
                                <label htmlFor="inputRole" className="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-wider">Selecciona tu Rol (Pruebas)</label>
                                <select 
                                    className="w-full bg-white/20 text-white border border-white/30 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-xl px-4 py-3 outline-none transition-all duration-300 appearance-none shadow-inner [&>option]:text-gray-900" 
                                    id="inputRole"
                                    value={role}
                                    onChange={(e) => setRole(e.target.value)}
                                >
                                    <option value="Administrador">Administrador</option>
                                    <option value="Responsable">Responsable</option>
                                    <option value="Desarrollador">Desarrollador</option>
                                </select>
                            </div>

                            <button className="w-full mt-8 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-400 hover:to-yellow-600 text-black font-extrabold py-3.5 rounded-xl shadow-[0_0_20px_rgba(234,179,8,0.3)] hover:shadow-[0_0_30px_rgba(234,179,8,0.5)] transform hover:-translate-y-1 transition-all duration-300" type="submit">
                                INGRESAR AL SISTEMA
                            </button>
                            <p className="mt-6 mb-0 text-center text-white/40 text-xs font-medium tracking-wide">&copy; 2026 Cerrejón Minería de Colombia.</p>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, role, onLogout }) => {
            const [view, setView] = React.useState('home');

            return (
                <div className="h-screen flex flex-col overflow-hidden text-white pattern-bg">
                    {/* Native blur navigation */}
                    <nav className="bg-gray-900/60 backdrop-blur-xl border-b border-white/5 px-6 py-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('home')}>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-black font-black text-xl shadow-lg group-hover:rotate-12 transition-transform duration-300">
                                    C
                                </div>
                                <span className="text-xl font-bold text-white tracking-wide group-hover:text-yellow-400 transition-colors">Gestión Cerrejón</span>
                            </div>
                            
                            <div className="flex items-center gap-6">
                                { (role === 'Administrador' || role === 'Desarrollador') && (
                                    <button 
                                        className="hidden md:flex items-center gap-2 bg-blue-600/90 hover:bg-blue-500 border border-blue-400/50 text-white font-semibold py-2 px-4 rounded-full shadow-[0_0_15px_rgba(37,99,235,0.4)] transform hover:-translate-y-0.5 transition-all duration-300 text-sm" 
                                        onClick={() => setView('crear_checklist')}
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                        </svg>
                                        Crear CheckList
                                    </button>
                                )}
                                <div className="hidden md:block flex-col text-right">
                                    <span className="text-white/60 text-[10px] font-semibold uppercase tracking-wider block leading-tight">Usuario Activo</span>
                                    <span className="text-white font-bold block text-sm">{user} <span className="text-yellow-400 text-xs bg-yellow-400/10 px-2 py-0.5 rounded-full ml-1 border border-yellow-400/20">{role}</span></span>
                                </div>
                                <div className="h-8 w-px bg-white/20 hidden md:block"></div>
                                <button 
                                    className="text-white/80 hover:text-red-400 font-semibold text-sm transition-colors py-2 px-3 rounded-lg hover:bg-red-400/10" 
                                    onClick={onLogout}
                                >
                                    Cerrar Sesión
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8">
                        <div className="max-w-7xl mx-auto">
                            {view === 'home' && (
                                <div className="flex flex-col items-center justify-center mt-8 md:mt-16 animate-[fadeIn_0.5s_ease-out]">
                                    <div className="bg-white/10 backdrop-blur-2xl border border-white/10 p-10 rounded-[2rem] shadow-[0_15px_50px_rgba(0,0,0,0.5)] text-center max-w-2xl w-full">
                                        
                                        <div className="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-400/30">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </div>

                                        <h1 className="text-4xl font-extrabold text-white mb-4 tracking-tight">¡Bienvenido al portal!</h1>
                                        <p className="text-lg text-white/70 font-medium mb-8">Has accedido exitosamente a la red segura de la mina.</p>
                                        
                                        <div className="bg-gray-900/40 border border-white/5 p-6 rounded-2xl text-left shadow-inner backdrop-blur-sm">
                                            <h5 className="font-bold text-yellow-400 mb-4 pb-3 border-b border-white/10 flex items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                                </svg>
                                                Permisos activos para el rol {role}
                                            </h5>
                                            <ul className="grid grid-cols-1 md:grid-cols-2 gap-4 text-white/90 text-sm">
                                                {tienePermiso(role, 'control_total') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Control Total</li>}
                                                {tienePermiso(role, 'ver_checklist_productivos') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Ver checklist productivos</li>}
                                                {tienePermiso(role, 'gestionar_items_productivos') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Gestionar items productivos</li>}
                                                {tienePermiso(role, 'ver_avances') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Ver avances</li>}
                                                {tienePermiso(role, 'ver_checklist_desarrollo') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Ver checklist desarrollo</li>}
                                                {tienePermiso(role, 'gestionar_checklist_desarrollo') && <li className="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/5"><span className="text-green-400">✓</span> Gestionar checklist desarrollo</li>}
                                            </ul>
                                        </div>

                                        {/* Mobile view button */}
                                        { (role === 'Administrador' || role === 'Desarrollador') && (
                                            <button 
                                                className="mt-8 md:hidden w-full flex justify-center items-center gap-2 bg-blue-600 border border-blue-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.4)]" 
                                                onClick={() => setView('crear_checklist')}
                                            >
                                                + Crear CheckList
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {view === 'crear_checklist' && (
                                <div className="animate-[fadeIn_0.3s_ease-out]">
                                    <CrearCheckList onAtras={() => setView('home')} />
                                </div>
                            )}
                        </div>
                    </main>
                    
                    {/* Native CSS Animations & Pattern overlay */}
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(15px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                    `}} />
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [currentUser, setCurrentUser] = React.useState('');
            const [currentRole, setCurrentRole] = React.useState('');

            const handleLogin = (user, role) => {
                setIsLoggedIn(true);
                setCurrentUser(user);
                setCurrentRole(role);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser('');
                setCurrentRole('');
            };

            return isLoggedIn ? <Dashboard user={currentUser} role={currentRole} onLogout={handleLogout} /> : <Login onLogin={handleLogin} />;
        };

        const rootContainer = document.getElementById('root');
        if (rootContainer) {
            const root = ReactDOM.createRoot(rootContainer);
            root.render(<App />);
        }
    </script>
</body>

</html>
