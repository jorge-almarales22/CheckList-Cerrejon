        // SharePoint API Helpers
        const getRequestDigest = async () => {

                method: 'POST',
                headers: { "Accept": "application/json;odata=verbose" },
                credentials: 'same-origin'
            });
            const data = await res.json();
            return data.d.GetContextWebInformation.FormDigestValue;
        };

        const getEntityType = async (listName) => {
            const res = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('${listName}')`, {
                headers: { "Accept": "application/json;odata=verbose" },
                credentials: "same-origin"
            });
            const json = await res.json();
            return json.d.ListItemEntityTypeFullName;
        };

        const saveToSPList = async (listName, data, digest) => {
            const entityType = await getEntityType(listName);
            const res = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('${listName}')/items`, {
                method: 'POST',
                headers: {
                    "Accept": "application/json;odata=verbose",
                    "Content-Type": "application/json;odata=verbose",
                    "X-RequestDigest": digest
                },
                credentials: 'same-origin',
                body: JSON.stringify({ "__metadata": { "type": entityType }, ...data })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} error saving to ${listName}`);
            return res.json();
        };

        const updateSPListItem = async (listName, itemId, data, digest) => {

                method: 'POST',
                headers: {

                    "X-RequestDigest": digest,
                    "X-HTTP-Method": "MERGE",
                    "If-Match": "*"
                },
                credentials: 'same-origin',
                body: JSON.stringify({ "__metadata": { "type": entityType }, ...data })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} error updating ${listName}`);

        const fileToBase64 = (file) => new Promise((resolve, reject) => {

            reader.onload = () => resolve(reader.result);

        });

        const calcularCumplimiento = (fechaInicio, fechaFin) => {
            if (!fechaFin || !fechaInicio) return 0;
            const start = new Date(fechaInicio); start.setHours(0, 0, 0, 0);
            const end = new Date(fechaFin); end.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);

            const totalDiff = end.getTime() - start.getTime();
            if (totalDiff <= 0) return 100;
            const currentDiff = today.getTime() - start.getTime();
            let percent = (currentDiff / totalDiff) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            return Math.round(percent);
        };

        const calcularPromedioChecklist = (items) => {
            if (!items || items.length === 0) return 0;
            let total = 0;
            items.forEach(it => { total += calcularCumplimiento(it.FechaInicio, it.FechaFin); });
            return Math.round(total / items.length);
        };

        const calcularPromedioReal = (items) => {
            if (!items || items.length === 0) return 0;
            let total = 0;
            items.forEach(it => { total += parseInt(it.Avance || it.avance) || 0; });
            return Math.round(total / items.length);

        const PeoplePicker = ({ value, onChange, placeholder, className, readOnly }) => {
            const [query, setQuery] = React.useState(value || '');
            const [results, setResults] = React.useState([]);
            const [isOpen, setIsOpen] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const wrapperRef = React.useRef(null);

            React.useEffect(() => {
                setQuery(value || '');
            }, [value]);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            React.useEffect(() => {
                if (!query || query === value || readOnly) {
                    setResults([]);
                    return;
                }

                const delayDebounceFn = setTimeout(async () => {
                    setLoading(true);
                    try {
                        const digest = await getRequestDigest();
                        const response = await fetch(`${SITE_URL}/_api/SP.UI.ApplicationPages.ClientPeoplePickerWebServiceInterface.clientPeoplePickerSearchUser`, {
                            method: 'POST',
                            headers: {
                                "Accept": "application/json;odata=verbose",
                                "Content-Type": "application/json;odata=verbose",
                                "X-RequestDigest": digest
                            },
                            credentials: 'same-origin',
                            body: JSON.stringify({
                                queryParams: {
                                    __metadata: { type: "SP.UI.ApplicationPages.ClientPeoplePickerQueryParameters" },
                                    AllowEmailAddresses: true,
                                    AllowMultipleEntities: false,
                                    AllUrlZones: false,
                                    MaximumEntitySuggestions: 10,
                                    PrincipalSource: 15,
                                    PrincipalType: 1,
                                    QueryString: query
                                }
                            })
                        });
                        const data = await response.json();
                        const parsedResults = JSON.parse(data.d.ClientPeoplePickerSearchUser);
                        setResults(parsedResults);
                        setIsOpen(true);
                    } catch (error) {
                        console.error("Error searching users:", error);
                    } finally {
                        setLoading(false);
                    }
                }, 500);

                return () => clearTimeout(delayDebounceFn);
            }, [query, value, readOnly]);

            const handleSelect = (user) => {
                const email = user.EntityData.Email || user.Key;
                setQuery(email);
                setIsOpen(false);
                onChange(email);
            };

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <input
                        type="text"
                        className={`${className} ${readOnly ? 'bg-transparent border-transparent' : ''}`}
                        placeholder={placeholder || "Buscar usuario AD..."}
                        value={query}
                        onChange={(e) => {
                            setQuery(e.target.value);
                            if(e.target.value !== value) onChange('');
                        }}
                        onFocus={() => { if(results.length > 0 && !readOnly) setIsOpen(true); }}
                        readOnly={readOnly}
                        required={!readOnly}
                    />
                    {loading && <div className="absolute right-3 top-3 w-4 h-4 border-2 border-yellow-400 border-t-transparent rounded-full animate-spin"></div>}

                        <ul className="absolute z-[999] min-w-[300px] left-0 bg-gray-800 border border-white/20 rounded-lg mt-1 max-h-60 overflow-y-auto shadow-2xl">
                            {results.map((user, idx) => (
                                <li
                                    key={idx}
                                    className="px-4 py-3 hover:bg-white/10 cursor-pointer border-b border-white/5 last:border-0 flex items-center gap-3"
                                    onClick={() => handleSelect(user)}
                                >
                                    <img 
                                        src={`https://glencore.sharepoint.com/_layouts/15/userphoto.aspx?size=S&accountname=${user.EntityData.Email || user.Key}`}
                                        alt={user.DisplayText}
                                        className="w-10 h-10 rounded-full border border-white/20 object-cover bg-gray-700"
                                        onError={(e) => { e.target.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23ccc' viewBox='0 0 24 24'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }}
                                    />
                                    <div className="flex flex-col">
                                        <span className="text-white font-bold text-sm leading-tight">{user.DisplayText}</span>
                                        <span className="text-white/50 text-xs">{user.EntityData.Email || user.Key}</span>
                                    </div>
                                </li>
                            ))}
                        </ul>

        const DashboardCharts = ({ items }) => {
            if (!items || items.length === 0) return null;
            const avanceGeneral = Math.round(items.reduce((acc, it) => acc + (parseInt(it.Avance || it.avance) || 0), 0) / items.length);

            const respMap = {};
            items.forEach(it => {
               const r = it.NombreResponsable || it.nombreResponsable || 'Sin asignar';
               if(!respMap[r]) respMap[r] = { total: 0, count: 0 };
               respMap[r].total += parseInt(it.Avance || it.avance) || 0;
               respMap[r].count += 1;
            });

            const dataChart = Object.keys(respMap).map(k => ({
               name: k,
               avg: Math.round(respMap[k].total / respMap[k].count)
            })).sort((a, b) => b.avg - a.avg);

            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (avanceGeneral / 100) * circumference;

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8 animate-[fadeIn_0.5s_ease-out]">
                    <div className="bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] flex flex-col items-center justify-center">

                                <circle cx="80" cy="80" r={radius} fill="transparent" stroke="#eab308" strokeWidth="20" strokeDasharray={circumference} strokeDashoffset={offset} className="transition-all duration-1000 ease-out" strokeLinecap="round" />
                            </svg>

                                </div>
                            ))}

            if (!items || items.length === 0) return null;
            const getValidDate = (d) => d ? new Date(d) : null;
            let minDate = new Date('2999-12-31');
            let maxDate = new Date('1970-01-01');
            let hasAnyDate = false;

            items.forEach(it => {
                const d1 = getValidDate(it.FechaBaselineInicio || it.fechaBaselineInicio);
                const d2 = getValidDate(it.FechaBaselineFin || it.fechaBaselineFin);
                const d3 = getValidDate(it.FechaInicio || it.fechaInicio);
                const d4 = getValidDate(it.FechaFin || it.fechaFin);
                
                if(d1 && d1 < minDate) { minDate = d1; hasAnyDate = true; }
                if(d3 && d3 < minDate) { minDate = d3; hasAnyDate = true; }
                if(d2 && d2 > maxDate) { maxDate = d2; hasAnyDate = true; }
                if(d4 && d4 > maxDate) { maxDate = d4; hasAnyDate = true; }
            });

            if (!hasAnyDate) return (
                <div className="bg-gray-900/80 p-6 rounded-2xl border border-white/20 shadow-2xl mt-8 text-center text-white/50">
                    No hay tareas con Fechas (Baseline o Reales) v&aacute;lidas para generar el Diagrama de Gantt.
                </div>
            );

            let totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);
            if (totalDays <= 0) totalDays = 1;

            return (
                <div className="bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] mt-8 overflow-x-auto animate-[fadeIn_0.5s_ease-out]">
                    <h3 className="text-xl font-bold text-yellow-400 mb-6 flex items-center gap-2">
                        &#128200; Diagrama de Gantt del Checklist
                    </h3>
                    
                    <div className="min-w-[800px] pb-4">
                        <div className="flex justify-between text-xs font-bold text-white/50 mb-3 px-[220px] border-b border-white/10 pb-2">
                            <span>Inicio Proyecto: {minDate.toISOString().split('T')[0]}</span>
                            <span>Fin Proyecto: {maxDate.toISOString().split('T')[0]}</span>
                        </div>

                        <div className="space-y-4 relative">
                            {items.map((it, idx) => {
                                const baseStart = getValidDate(it.FechaBaselineInicio || it.fechaBaselineInicio);
                                const baseEnd = getValidDate(it.FechaBaselineFin || it.fechaBaselineFin);
                                const actStart = getValidDate(it.FechaInicio || it.fechaInicio);
                                const actEnd = getValidDate(it.FechaFin || it.fechaFin);
                                const avance = parseInt(it.Avance || it.avance) || 0;

                                let baseLeftPercent = 0, baseWidthPercent = 0;
                                if (baseStart && baseEnd) {
                                    const leftDays = (baseStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (baseEnd - baseStart) / (1000 * 60 * 60 * 24);
                                    if(durDays < 1) durDays = 1;
                                    baseLeftPercent = (leftDays / totalDays) * 100;
                                    baseWidthPercent = (durDays / totalDays) * 100;
                                }

                                let actLeftPercent = 0, actWidthPercent = 0;
                                if (actStart && actEnd) {
                                    const leftDays = (actStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (actEnd - actStart) / (1000 * 60 * 60 * 24);
                                    if(durDays < 1) durDays = 1;
                                    actLeftPercent = (leftDays / totalDays) * 100;
                                    actWidthPercent = (durDays / totalDays) * 100;
                                }

                                return (
                                    <div key={it.Id || idx} className="flex items-center gap-4 text-sm group">
                                        <div className="w-[200px] flex-shrink-0 text-white/80 whitespace-normal break-words font-medium text-xs leading-tight" title={it.Descripcion || it.actividades}>
                                            <span className="text-white/40 mr-1 font-bold">{idx + 1}.</span> {it.Descripcion || it.actividades}
                                        </div>
                                        
                                        <div className="flex-1 bg-white/5 h-12 rounded-lg relative overflow-hidden flex flex-col justify-center gap-1 border border-white/5">
                                            
                                            {baseStart && baseEnd && (
                                                <div 
                                                    className="absolute h-2 top-1.5 bg-[repeating-linear-gradient(45deg,transparent,transparent_2px,rgba(96,165,250,0.5)_2px,rgba(96,165,250,0.5)_4px)] bg-blue-900/30 border border-blue-400/50 rounded-sm"
                                                    style={{ left: `${baseLeftPercent}%`, width: `${baseWidthPercent}%` }}
                                                    title={`Planificado (Baseline): ${(it.FechaBaselineInicio || it.fechaBaselineInicio)} a ${(it.FechaBaselineFin || it.fechaBaselineFin)}`}
                                                ></div>
                                            )}

                                            {actStart && actEnd && (
                                                <div 
                                                    className="absolute h-5 bottom-1.5 bg-yellow-600/40 border border-yellow-500/50 rounded flex flex-col justify-center overflow-hidden transition-all duration-300 shadow-inner"
                                                    style={{ left: `${actLeftPercent}%`, width: `${actWidthPercent}%` }}
                                                    title={`Real: ${(it.FechaInicio || it.fechaInicio)} a ${(it.FechaFin || it.fechaFin)} \nAvance: ${avance}%`}
                                                >
                                                    <div 
                                                        className="absolute top-0 left-0 h-full bg-gradient-to-r from-yellow-400 to-yellow-500 transition-all duration-500" 
                                                        style={{ width: `${avance}%` }}
                                                    ></div>
                                                    <span className="relative z-10 text-[10px] font-extrabold text-black px-2 drop-shadow-md truncate">
                                                        {avance}%
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const CrearCheckList = ({ onAtras, currentUser, currentRole, templateType }) => {
            const [nombreChecklist, setNombreChecklist] = React.useState('');
            const [isSaving, setIsSaving] = React.useState(false);
            const [showAddItemForm, setShowAddItemForm] = React.useState(false);

            const getTipoFormulario = () => {
                if (templateType === 'proyectos') return 'PROYECTO';
                if (templateType === 'compra_instalada') return 'COMPRA INSTALADA';
                if (templateType === 'ensamble') return 'ENSAMBLE';
                return 'GENERAL';
            };

            const [metadata, setMetadata] = React.useState({
                equipos: [''],
                imagenEquipo: '',
                roles: {
                    lider: { area: '', persona: '' },
                    custodio: { area: '', persona: '' },
                    operador: { area: '', persona: '' },
                    mantenedor: { area: '', persona: '' }
                },
                fechaInicioDiligenciamiento: new Date().toISOString().split('T')[0],
                fechaFinDiligenciamiento: 'Se completar\u00e1 al finalizar',
                comentarios: ''
            });

            const [items, setItems] = React.useState(() => {
                let sourceArray = [];
                if (templateType === 'proyectos') sourceArray = CHECKLIST_PROYECTOS_ITEMS;
                else if (templateType === 'compra_instalada') sourceArray = CHECKLIST_COMPRA_INSTALADA;
                else if (templateType === 'ensamble') sourceArray = CHECKLIST_EQUIPOS_NUEVOS_USADOS_ENSAMBLE;
                else sourceArray = PREDEFINED_ITEMS;

                const hoy = new Date().toISOString().split('T')[0];
                return sourceArray.map((act, idx) => ({
                    id: Date.now() + Math.random().toString(36).substr(2, 5) + idx,
                    actividades: act,
                    entregable: '',
                    nombreResponsable: '',
                    avance: '0',
                    fechaBaselineInicio: hoy,
                    fechaBaselineFin: '',
                    fechaInicio: hoy,
                    fechaFin: '',
                    isAlert: false
                }));
            });

            const [formData, setFormData] = React.useState({
                actividades: '', entregable: '', nombreResponsable: '', avance: '', 
                fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                fechaInicio: new Date().toISOString().split('T')[0], fechaFin: '',
            });

            const [editingId, setEditingId] = React.useState(null);

            const handleMetadataRoleChange = (roleKey, field, value) => {
                setMetadata(prev => ({
                    ...prev,
                    roles: { ...prev.roles, [roleKey]: { ...prev.roles[roleKey], [field]: value } }
                }));
            };

            const handleMetadataEquipoChange = (index, value) => {
                const newEquipos = [...metadata.equipos];
                newEquipos[index] = value;
                setMetadata(prev => ({ ...prev, equipos: newEquipos }));
            };

            const addEquipo = () => {
                setMetadata(prev => ({ ...prev, equipos: [...prev.equipos, ''] }));
            };

            const handleItemEdit = (id, field, value) => {
                if (field === 'avance') {
                    let val = parseInt(value) || 0;
                    if (val >= 100) val = 99; 
                    value = val.toString();
                }
                setItems(prev => prev.map(it => it.id === id ? { ...it, [field]: value } : it));
            };

            const handleChange = (e) => {
                let { name, value } = e.target;
                if (name === 'avance') {
                    let val = parseInt(value) || 0;
                    if (val >= 100) val = 99; 
                    value = val.toString();
                }
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                const newItem = { ...formData, id: Date.now() + Math.random().toString(36).substr(2, 5) };
                setItems([...items, newItem]);
                setFormData({ 
                    actividades: '', entregable: '', nombreResponsable: '', avance: '', 
                    fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                    fechaInicio: new Date().toISOString().split('T')[0], fechaFin: '' 
                });
                setShowAddItemForm(false);
            };

            const handleDeleteItem = (id) => setItems(items.filter(it => it.id !== id));

            const handleGuardarChecklist = async () => {
                if (!nombreChecklist.trim()) { alert('Ingresa el nombre del checklist.'); return; }
                if (items.length === 0) { alert('Agrega al menos un \u00edtem.'); return; }

                const has100 = items.some(it => parseInt(it.avance) >= 100);
                if (has100) {
                    alert("\u26a0\ufe0f Error: No puedes guardar tareas con 100% de avance inicial, ya que a\u00fan no tienen evidencia cargada.");
                    return;
                }

                setIsSaving(true);
                const newChecklistId = 'CHK-' + Date.now();

                try {
                    const digest = await getRequestDigest();
                    const finalItems = items.map((it) => ({
                        Id: it.id,
                        Descripcion: it.actividades,
                        NombreResponsable: it.nombreResponsable,
                        Entregable: it.entregable,
                        Avance: it.avance ? it.avance.toString() : "0",
                        FechaBaselineInicio: it.fechaBaselineInicio,
                        FechaBaselineFin: it.fechaBaselineFin,
                        FechaInicio: it.fechaInicio,
                        FechaFin: it.fechaFin,
                        Alerta: "No",
                        HistorialComentarios: [], 
                        Evidencias: ""
                    }));

                    const checklistData = {
                        ID_x002d_checklist: newChecklistId,
                        Name: nombreChecklist,
                        ComentarioGeneral: "",
                        Tipo: getTipoFormulario(),
                        Metadata: metadata,
                        items: finalItems
                    };

                    await saveToSPList('DB_CHECKLIST_APP', {
                        Title: newChecklistId,
                        Data: JSON.stringify(checklistData)
                    }, digest);

                    alert('\u00a1Checklist guardado con \u00e9xito en SharePoint (JSON optimizado)!');
                    onAtras();

                } catch (error) {
                    console.error("Error saving:", error);
                    alert("Ocurri\u00f3 un error guardando en SharePoint. Verifica la consola.");
                } finally {
                    setIsSaving(false);
                }
            };

            const inputClasses = "w-full bg-black/50 text-white border border-white/20 focus:border-yellow-400 rounded px-3 py-2 outline-none transition-all duration-300";
            
            let titlePrefix = templateType === 'proyectos' ? "Plantilla: Proyectos" : templateType === 'compra_instalada' ?
            "Plantilla: Compra Instalada" : templateType === 'ensamble' ? "Plantilla: Ensamble" : "Crear Nuevo Checklist";

            return (
                <div className="bg-black/80 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] text-white mt-8 mx-auto max-w-6xl animate-[fadeIn_0.3s_ease-out]">
                    <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/20">
                        <h2 className="text-2xl lg:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{titlePrefix}</h2>
                        <button className="bg-white/10 hover:bg-white/20 border border-white/30 text-white text-sm font-semibold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors shadow" onClick={onAtras}>
                            <span>&larr;</span> Volver al Listado
                        </button>
                    </div>

                    <div className="mb-8">
                        <label className="block text-sm font-semibold text-yellow-400 mb-2">Nombre del Checklist</label>
                        <input type="text" className="w-full bg-black/50 text-white border border-white/30 focus:border-yellow-400 rounded-xl px-4 py-3 outline-none transition-all duration-300 text-lg font-bold" placeholder="Ej. Nuevo Proyecto" value={nombreChecklist} onChange={(e) => setNombreChecklist(e.target.value)} required />
                    </div>

                    <div className="border border-white/20 rounded-lg overflow-hidden text-sm mb-8 bg-white/5">
                        <div className="flex flex-col md:flex-row border-b border-white/20">
                            <div className="w-full md:w-1/3 p-4 border-r border-white/20 flex flex-col gap-3">
                                <span className="font-bold text-[10px] uppercase tracking-wider text-white/50">DESCRIPCI&Oacute;N DE EQUIPO(S) A INCORPORAR</span>
                                {metadata.equipos.map((eq, idx) => (
                                    <textarea key={idx} className={inputClasses + " text-xs"} placeholder={"Describe aqu\u00ed un equipo a incorporar..."} rows="2" value={eq} onChange={(e) => handleMetadataEquipoChange(idx, e.target.value)}></textarea>
                                ))}
                                <button onClick={addEquipo} className="bg-white/10 hover:bg-white/20 text-xs font-bold py-1.5 px-3 rounded self-start transition-colors border border-white/10">A&ntilde;adir otro activo</button>
                                
                                <div className="mt-3 pt-3 border-t border-white/10">
                                    <span className="font-bold text-[10px] uppercase tracking-wider text-white/50 block mb-2">FOTO DEL EQUIPO</span>
                                    {metadata.imagenEquipo ? (
                                        <div className="relative inline-block">
                                            <img src={metadata.imagenEquipo} alt="Equipo" className="h-24 rounded-lg border border-white/20 object-cover shadow-lg" />
                                            <button onClick={() => setMetadata({...metadata, imagenEquipo: ''})} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow-lg hover:bg-red-400">&times;</button>
                                        </div>
                                    ) : (
                                        <input type="file" accept="image/*" onChange={async (e) => {
                                            const file = e.target.files[0];
                                            if(file) {
                                                const base64 = await fileToBase64(file);
                                                setMetadata({...metadata, imagenEquipo: base64});
                                            }
                                        }} className="text-[10px] text-white/70 w-full file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:font-semibold file:bg-white/10 file:text-white hover:file:bg-white/20 transition-all cursor-pointer" />
                                    )}
                                </div>
                            </div>
                            <div className="w-full md:w-2/3 flex flex-col">
                                <div className="grid grid-cols-12 bg-black/40 border-b border-white/20 font-bold text-[10px] uppercase tracking-wider text-white/50">
                                    <div className="col-span-4 p-2 border-r border-white/20 flex items-center">ROL</div>
                                    <div className="col-span-4 p-2 border-r border-white/20 flex items-center">&Aacute;rea</div>
                                    <div className="col-span-4 p-2 flex items-center">Nombre representante</div>
                                </div>
                                {['lider', 'custodio', 'operador', 'mantenedor'].map((roleKey) => (
                                    <div key={roleKey} className="grid grid-cols-12 border-b border-white/20 items-stretch">
                                        <div className="col-span-4 p-2 border-r border-white/20 font-bold text-[10px] uppercase flex items-center bg-black/20">
                                            {roleKey === 'lider' ? 'L\u00cdDER DE PROYECTO' : roleKey}
                                        </div>
                                        <div className="col-span-4 p-2 border-r border-white/20 flex items-center">
                                            <select className={inputClasses + " text-xs py-1.5 px-2"} value={metadata.roles[roleKey].area} onChange={(e) => handleMetadataRoleChange(roleKey, 'area', e.target.value)}>
                                                <option value="">Seleccione</option>
                                                {AREAS.map(a => <option key={a} value={a}>{a}</option>)}
                                            </select>
                                        </div>
                                        <div className="col-span-4 p-2 flex items-center">
                                            <PeoplePicker className={inputClasses + " text-xs py-1.5 px-2"} placeholder="Buscar persona..." value={metadata.roles[roleKey].persona} onChange={(val) => handleMetadataRoleChange(roleKey, 'persona', val)} />
                                        </div>
                                    </div>
                                ))}
                                <div className="grid grid-cols-12 items-stretch bg-black/20">
                                    <div className="col-span-4 p-2 border-r border-white/20 font-bold text-[10px] uppercase flex items-center">TIPO DE FORMULARIO:</div>
                                    <div className="col-span-8 p-2 flex items-center">
                                        <input type="text" className={inputClasses + " text-xs py-1.5 px-2 bg-black/20 text-white/50 cursor-not-allowed"} value={getTipoFormulario()} readOnly />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col">
                            <div className="flex border-b border-white/20 bg-black/20">
                                <div className="w-1/3 p-3 font-bold text-xs flex items-center border-r border-white/20">Fecha inicio diligenciamiento</div>
                                <div className="w-2/3 p-2"><input type="date" className={inputClasses + " text-xs py-1.5 max-w-[200px]"} value={metadata.fechaInicioDiligenciamiento} onChange={(e) => setMetadata({...metadata, fechaInicioDiligenciamiento: e.target.value})} /></div>
                            </div>
                            <div className="flex border-b border-white/20 bg-black/20">
                                <div className="w-1/3 p-3 font-bold text-xs flex items-center border-r border-white/20">Fecha fin diligenciamiento</div>
                                <div className="w-2/3 p-2"><input type="text" className={inputClasses + " text-xs py-1.5 max-w-[300px] bg-black/20 text-white/50 cursor-not-allowed"} value={metadata.fechaFinDiligenciamiento} readOnly title="Nota: Este campo est\u00e1 bloqueado y no se actualizar\u00e1 autom\u00e1ticamente sin programaci\u00f3n adicional de cierre." /></div>
                            </div>
                            <div className="flex">
                                <div className="w-1/3 p-3 font-bold text-xs flex items-center border-r border-white/20">Comentarios</div>
                                <div className="w-2/3 p-2"><textarea className={inputClasses + " text-xs"} rows="2" placeholder={"Escribe aqu\u00ed cualquier observaci\u00f3n..."} value={metadata.comentarios} onChange={(e) => setMetadata({...metadata, comentarios: e.target.value})}></textarea></div>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                        <h3 className="text-lg font-bold text-yellow-400">&Iacute;tems de este Checklist ({items.length})</h3>
                        <button onClick={() => setShowAddItemForm(!showAddItemForm)} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all shadow-lg border ${showAddItemForm ? 'bg-red-500/20 text-red-300 border-red-500/30 hover:bg-red-500/40' : 'bg-blue-600 hover:bg-blue-500 text-white border-blue-400/50'}`}>
                            {showAddItemForm ? '\u2715 Cancelar Agregar' : '\u2795 Agregar Nuevo \u00cdtem'}
                        </button>
                    </div>

                    {showAddItemForm && (
                        <div className="bg-white/5 p-6 rounded-xl border border-blue-500/30 mb-8 animate-[fadeIn_0.2s_ease-out] shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                            <form onSubmit={handleAddItem} className="space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                    <div className="md:col-span-12">
                                        <label className="block text-xs font-bold text-white/70 mb-1">Descripci&oacute;n</label>
                                        <textarea className={inputClasses} value={formData.actividades} onChange={(e) => setFormData({...formData, actividades: e.target.value})} rows="2" required></textarea>
                                    </div>
                                    <div className="md:col-span-4">
                                        <label className="block text-xs font-bold text-white/70 mb-1">Responsable</label>
                                        <PeoplePicker className={inputClasses} value={formData.nombreResponsable} onChange={(val) => setFormData(prev => ({ ...prev, nombreResponsable: val }))} />
                                    </div>
                                    <div className="md:col-span-4">
                                        <label className="block text-xs font-bold text-white/70 mb-1">Entregable</label>
                                        <input type="text" className={inputClasses} value={formData.entregable} onChange={(e) => setFormData({...formData, entregable: e.target.value})} required />
                                    </div>
                                    <div className="md:col-span-4">
                                        <label className="block text-xs font-bold text-white/70 mb-1">Avance (%)</label>
                                        <input type="number" min="0" max="99" className={inputClasses} value={formData.avance} onChange={(e) => { let v = parseInt(e.target.value)||0; if(v>99)v=99; setFormData({...formData, avance: v.toString()}) }} required />
                                    </div>
                                    <div className="md:col-span-3">
                                        <label className="block text-xs font-bold text-blue-300 mb-1">Plan Inicio (Baseline)</label>
                                        <input type="date" className={inputClasses + " border-blue-400/40 bg-blue-900/10"} value={formData.fechaBaselineInicio} onChange={(e) => setFormData({...formData, fechaBaselineInicio: e.target.value})} required />
                                    </div>
                                    <div className="md:col-span-3">
                                        <label className="block text-xs font-bold text-blue-300 mb-1">Plan Fin (Baseline)</label>
                                        <input type="date" className={inputClasses + " border-blue-400/40 bg-blue-900/10"} value={formData.fechaBaselineFin} onChange={(e) => setFormData({...formData, fechaBaselineFin: e.target.value})} required />
                                    </div>
                                    <div className="md:col-span-3">
                                        <label className="block text-xs font-bold text-yellow-400/80 mb-1">Fecha Inicio Real</label>
                                        <input type="date" className={inputClasses + " border-yellow-500/30 bg-yellow-900/10"} value={formData.fechaInicio} onChange={(e) => setFormData({...formData, fechaInicio: e.target.value})} required />
                                    </div>
                                    <div className="md:col-span-3">
                                        <label className="block text-xs font-bold text-yellow-400/80 mb-1">Fecha Fin Real</label>
                                        <input type="date" className={inputClasses + " border-yellow-500/30 bg-yellow-900/10"} value={formData.fechaFin} onChange={(e) => setFormData({...formData, fechaFin: e.target.value})} required />
                                    </div>
                                </div>
                                <div className="flex justify-end pt-2">
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded shadow-lg transition-colors">Confirmar &Iacute;tem</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="mb-8">
                        {items.length === 0 ? (
                            <div className="text-center py-8 bg-black/40 rounded-xl border border-white/5 border-dashed">
                                <p className="text-white/50">A&uacute;n no hay &iacute;tems en este checklist.</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {items.map((it, idx) => (
                                    <div key={it.id} className={`bg-black/60 p-5 rounded-2xl border transition-all shadow-[0_0_15px_rgba(0,0,0,0.3)] ${editingId === it.id ? 'border-yellow-400' : 'border-white/10'}`} onDoubleClick={() => setEditingId(it.id)}>
                                        <div className="flex justify-between items-start gap-4">
                                            <div className="flex-1">
                                                <div className="flex items-start gap-3 mb-2 border-b border-white/10 pb-3">
                                                    <span className="bg-white/10 text-white text-xs font-bold px-2.5 py-1 rounded-md mt-0.5 border border-white/5 shadow-inner">#{idx + 1}</span>
                                                    {editingId === it.id ? (
                                                        <textarea className="w-full bg-black/50 text-yellow-400 border border-yellow-400/50 rounded-lg px-3 py-2 text-sm outline-none resize-none break-words whitespace-normal focus:ring-1 focus:ring-yellow-400" value={it.actividades} onChange={(e) => handleItemEdit(it.id, 'actividades', e.target.value)} rows="2" />
                                                    ) : (
                                                        <h4 className="font-bold text-yellow-400 leading-snug break-words whitespace-normal text-[15px]">{it.actividades}</h4>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-2 lg:grid-cols-6 gap-5 mt-4 text-sm">
                                                    <div className="col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Responsable</span>
                                                        {editingId === it.id ? (
                                                            <PeoplePicker className="w-full bg-black/50 text-white border border-white/30 rounded px-2 py-1.5 text-xs outline-none focus:border-yellow-400" value={it.nombreResponsable} onChange={(val) => handleItemEdit(it.id, 'nombreResponsable', val)} />
                                                        ) : (
                                                            <span className="text-white font-medium text-xs break-all">{it.nombreResponsable || '-'}</span>
                                                        )}
                                                    </div>
                                                    <div className="col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Entregable</span>
                                                        {editingId === it.id ? (
                                                            <input type="text" className="w-full bg-black/50 text-white border border-white/30 rounded px-2 py-1.5 text-xs outline-none focus:border-yellow-400" value={it.entregable} onChange={(e) => handleItemEdit(it.id, 'entregable', e.target.value)} />
                                                        ) : (
                                                            <span className="text-white font-medium text-xs break-words">{it.entregable || '-'}</span>
                                                        )}
                                                    </div>
                                                    <div className="col-span-1 md:col-span-2 lg:col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Fechas Plan (Baseline)</span>
                                                        {editingId === it.id ? (
                                                            <div className="space-y-1.5 mt-1">
                                                                <div className="flex items-center gap-1.5 text-xs"><span className="w-4 font-bold text-blue-300">I:</span><input type="date" className="bg-blue-900/20 text-white border border-blue-400/40 rounded px-1.5 py-1 outline-none flex-1 focus:border-yellow-400" value={it.fechaBaselineInicio} onChange={(e) => handleItemEdit(it.id, 'fechaBaselineInicio', e.target.value)} /></div>
                                                                <div className="flex items-center gap-1.5 text-xs"><span className="w-4 font-bold text-blue-300">F:</span><input type="date" className="bg-blue-900/20 text-white border border-blue-400/40 rounded px-1.5 py-1 outline-none flex-1 focus:border-yellow-400" value={it.fechaBaselineFin} onChange={(e) => handleItemEdit(it.id, 'fechaBaselineFin', e.target.value)} /></div>
                                                            </div>
                                                        ) : (
                                                            <div className="bg-blue-900/10 p-2 rounded border border-blue-400/20 shadow-inner">
                                                                <span className="text-white/80 font-medium block text-[11px]"><span className="text-blue-300 font-bold w-4 inline-block">I:</span> {it.fechaBaselineInicio || '-'}</span>
                                                                <span className="text-white/80 font-medium block text-[11px] mt-1"><span className="text-blue-300 font-bold w-4 inline-block">F:</span> {it.fechaBaselineFin || '-'}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="col-span-1 md:col-span-2 lg:col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Fechas Reales</span>
                                                        {editingId === it.id ? (
                                                            <div className="space-y-1.5 mt-1">
                                                                <div className="flex items-center gap-1.5 text-xs"><span className="w-4 font-bold text-yellow-400">I:</span><input type="date" className="bg-yellow-900/10 text-white border border-yellow-500/30 rounded px-1.5 py-1 outline-none flex-1 focus:border-yellow-400" value={it.fechaInicio} onChange={(e) => handleItemEdit(it.id, 'fechaInicio', e.target.value)} /></div>
                                                                <div className="flex items-center gap-1.5 text-xs"><span className="w-4 font-bold text-yellow-400">F:</span><input type="date" className="bg-yellow-900/10 text-white border border-yellow-500/30 rounded px-1.5 py-1 outline-none flex-1 focus:border-yellow-400" value={it.fechaFin} onChange={(e) => handleItemEdit(it.id, 'fechaFin', e.target.value)} /></div>
                                                            </div>
                                                        ) : (
                                                            <div className="bg-yellow-900/10 p-2 rounded border border-yellow-400/20 shadow-inner">
                                                                <span className="text-white font-medium block text-[11px]"><span className="text-yellow-400 font-bold w-4 inline-block">I:</span> {it.fechaInicio || '-'}</span>
                                                                <span className="text-white font-medium block text-[11px] mt-1"><span className="text-yellow-400 font-bold w-4 inline-block">F:</span> {it.fechaFin || '-'}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Cumplimiento (calc)</span>
                                                        <span className="text-green-400 font-black text-2xl drop-shadow">{calcularCumplimiento(it.fechaInicio, it.fechaFin)}%</span>
                                                    </div>
                                                    <div className="col-span-1">
                                                        <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Avance Real</span>
                                                        {editingId === it.id ? (
                                                            <input type="number" className="w-20 bg-black/50 text-white border border-white/30 rounded px-2 py-1 outline-none focus:border-yellow-400 text-lg font-bold" value={it.avance} onChange={(e) => handleItemEdit(it.id, 'avance', e.target.value)} min="0" max="99" />
                                                        ) : (
                                                            <span className="text-yellow-400 font-black text-2xl drop-shadow">{it.avance}%</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-2 min-w-[80px]">
                                                {editingId === it.id ? (
                                                    <button onClick={() => setEditingId(null)} className="bg-green-500/20 hover:bg-green-500/40 text-green-300 border border-green-500/30 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors w-full shadow-sm">Listo</button>
                                                ) : (
                                                    <button onClick={() => setEditingId(it.id)} className="bg-blue-500/20 hover:bg-blue-500/40 text-blue-300 border border-blue-500/30 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors w-full shadow-sm">Editar</button>
                                                )}
                                                <button onClick={() => handleDeleteItem(it.id)} className="bg-red-500/20 hover:bg-red-500/40 text-red-300 border border-red-500/30 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors w-full shadow-sm">Eliminar</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <button onClick={handleGuardarChecklist} disabled={items.length === 0 || isSaving} className={`w-full font-extrabold text-xl tracking-wide py-5 rounded-2xl shadow-2xl transition-all duration-300 ${items.length > 0 && !isSaving ? 'bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white hover:shadow-[0_0_40px_rgba(34,197,94,0.4)] hover:-translate-y-1' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                        {isSaving ? 'GUARDANDO EN SHAREPOINT...' : '\u2713 FINALIZAR Y GUARDAR CHECKLIST'}
                    </button>
                    
                    <DashboardCharts items={items} />
                </div>
            );
        };

        const CheckListDetalle = ({ checklistId, onAtras, role, currentUser }) => {
            const [checklist, setChecklist] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [editingId, setEditingId] = React.useState(null);
            const [editForm, setEditForm] = React.useState({});
            const [generalComment, setGeneralComment] = React.useState('');
            const [nuevosComentarios, setNuevosComentarios] = React.useState({});
            const isAdmin = role === 'Administrador';

            React.useEffect(() => {
                const fetchDetails = async () => {
                    try {
                        const listRes = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('DB_CHECKLIST_APP')/items?$filter=Title eq '${checklistId}'`, {
                            headers: { "Accept": "application/json;odata=verbose" }, credentials: "same-origin"
                        });
                        const listJson = await listRes.json();
                        
                        if (listJson.d.results.length > 0) {
                            const row = listJson.d.results[0];
                            const parsedData = JSON.parse(row.Data);
                            setChecklist({ ...parsedData, SharePointId: row.Id });
                            setGeneralComment(parsedData.ComentarioGeneral || '');
                        }
                    } catch (error) {
                        console.error("Error loading details:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchDetails();
            }, [checklistId]);

            const handleFileUpload = async (itemId, e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const base64 = await fileToBase64(file);
                    const digest = await getRequestDigest();
                    
                    const updatedItems = checklist.items.map(it => it.Id === itemId ? { ...it, Evidencias: base64, Avance: "100" } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    alert('Evidencia cargada. Avance actualizado al 100% automáticamente.');
                } catch (error) {
                    alert('Error subiendo evidencia. Revisa la consola.');
                    console.error(error);
                }
            };

            const handleStartEdit = (item) => {
                setEditingId(item.Id);
                setEditForm({ ...item });
            };

            const handleSaveEdit = async () => {
                if (parseInt(editForm.Avance) >= 100 && (!editForm.Evidencias || editForm.Evidencias === "")) {
                    alert("\u26a0\ufe0f Error: No puedes guardar el avance al 100% sin antes haber cargado una evidencia.");
                    return; 
                }

                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === editForm.Id ? {
                        ...it,
                        Descripcion: editForm.Descripcion,
                        NombreResponsable: editForm.NombreResponsable,
                        FechaInicio: editForm.FechaInicio,
                        FechaFin: editForm.FechaFin,
                        Avance: editForm.Avance ? editForm.Avance.toString() : "0", 
                        Alerta: editForm.Alerta || "No"
                    } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };
                    
                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    setEditingId(null);
                } catch (error) {
                    alert("Error guardando cambios. Revisa la consola.");
                    console.error(error);
                }
            };

            const handleDeleteItemDetalle = async (itemId) => {
                if(!window.confirm('¿Est\u00e1s seguro de eliminar este \u00edtem?')) return;
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.filter(it => it.Id !== itemId);
                    const updatedChecklist = { ...checklist, items: updatedItems };
                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                } catch (error) {
                    alert("Error eliminando ítem.");
                    console.error(error);
                }
            };

            const handleAgregarComentario = async (itemId) => {
                const texto = nuevosComentarios[itemId];
                if (!texto || !texto.trim()) return;

                const comentarioObj = {
                    texto: texto.trim(),
                    autor: currentUser,
                    fecha: new Date().toISOString(),
                };
                try {
                    const digest = await getRequestDigest();
                    let targetItem = null;
                    const updatedItems = checklist.items.map(it => {
                        if (it.Id === itemId) {
                            targetItem = it;
                            const history = it.HistorialComentarios || [];
                            return { ...it, HistorialComentarios: [...history, comentarioObj] };
                        }
                        return it;
                    });
                    
                    const updatedChecklist = { ...checklist, items: updatedItems };
                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    
                    setChecklist(updatedChecklist);
                    setNuevosComentarios({ ...nuevosComentarios, [itemId]: '' });

                    // NOTIFICACIÓN TEAMS: Solo si el autor del comentario no es el responsable
                    if (targetItem && targetItem.NombreResponsable && targetItem.NombreResponsable.toLowerCase() !== currentUser.toLowerCase()) {
                        notificarTeams(
                            "Nuevo Comentario",
                            targetItem.NombreResponsable,
                            `El usuario ${currentUser} ha comentado en tu tarea "${targetItem.Descripcion}": ${texto}`,
                            checklist.Name
                        );
                    }

                } catch (error) {
                    console.error(error);
                    alert("Error guardando el comentario.");
                }
            };

            const handleSaveGeneralComment = async () => {
                try {
                    const digest = await getRequestDigest();
                    const updatedChecklist = { ...checklist, ComentarioGeneral: generalComment };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    alert("Comentario general guardado exitosamente.");
                } catch (error) {
                    console.error(error);
                    alert("Error guardando el comentario general.");
                }
            };

            const toggleAlert = async (item) => {
                const newAlerta = item.Alerta === "Si" ? "No" : "Si";
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === item.Id ? { ...it, Alerta: newAlerta } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, { 
                        Data: JSON.stringify(updatedChecklist) 
                    }, digest);
                    setChecklist(updatedChecklist);

                    // NOTIFICACIÓN TEAMS: Solo si se está activando la alerta y el usuario actual NO es el responsable
                    if (newAlerta === "Si" && item.NombreResponsable && item.NombreResponsable.toLowerCase() !== currentUser.toLowerCase()) {
                        notificarTeams(
                            "Alerta Activada",
                            item.NombreResponsable,
                            `El usuario ${currentUser} ha marcado una alerta en tu tarea: "${item.Descripcion}".`,
                            checklist.Name
                        );
                    }
                } catch(error) { console.error(error); }
            };

            if (loading) return <div className="text-center text-white mt-20">Cargando detalles desde SharePoint...</div>;
            if (!checklist) return <div className="text-center text-white mt-20">Checklist no encontrado.</div>;

            return (
                <div className="max-w-7xl mx-auto animate-[fadeIn_0.3s_ease-out]">
                    <div className="flex justify-between items-center bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] mb-6">
                        <div>
                            <h2 className="text-3xl font-extrabold text-white mb-1"><span className="text-yellow-400">Checklist:</span> {checklist.Name}</h2>
                        </div>
                        <button className="bg-white/10 hover:bg-white/20 border border-white/30 text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2" onClick={onAtras}>
                            &larr; Volver
                        </button>
                    </div>

                    {checklist.Metadata && (
                        <div className="border border-white/20 rounded-2xl overflow-hidden text-sm mb-8 bg-black/60 backdrop-blur-2xl shadow-2xl text-white">
                            <div className="flex flex-col md:flex-row border-b border-white/10">
                                <div className="w-full md:w-1/3 p-5 border-r border-white/10 flex flex-col gap-2">
                                    <span className="font-extrabold text-[10px] uppercase tracking-widest text-yellow-400 mb-2">DESCRIPCI&Oacute;N DE EQUIPO(S) A INCORPORAR</span>
                                    {checklist.Metadata.equipos.map((eq, idx) => (
                                        <div key={idx} className="bg-white/5 p-3 rounded-lg border border-white/10 text-xs text-white/80 whitespace-pre-wrap">{eq || '-'}</div>
                                    ))}
                                    {checklist.Metadata.imagenEquipo && (
                                        <div className="mt-3 pt-3 border-t border-white/10">
                                            <span className="font-bold text-[10px] uppercase tracking-wider text-white/50 block mb-2">FOTO DEL EQUIPO</span>
                                            <img src={checklist.Metadata.imagenEquipo} alt="Equipo" className="max-h-32 rounded-lg border border-white/20 object-cover shadow-lg" />
                                        </div>
                                    )}
                                </div>
                                <div className="w-full md:w-2/3 flex flex-col">
                                    <div className="grid grid-cols-12 bg-black/40 border-b border-white/10 font-bold text-[10px] uppercase tracking-wider text-white/50">
                                        <div className="col-span-3 p-3 border-r border-white/10 flex items-center">ROL</div>
                                        <div className="col-span-4 p-3 border-r border-white/10 flex items-center">&Aacute;rea</div>
                                        <div className="col-span-5 p-3 flex items-center">Nombre representante</div>
                                    </div>
                                    {['lider', 'custodio', 'operador', 'mantenedor'].map((roleKey) => (
                                        <div key={roleKey} className="grid grid-cols-12 border-b border-white/10 items-stretch">
                                            <div className="col-span-3 p-3 border-r border-white/10 font-bold text-[10px] uppercase flex items-center bg-black/20 text-yellow-100">
                                                {roleKey === 'lider' ? 'L\u00cdDER DE PROYECTO' : roleKey}
                                            </div>
                                            <div className="col-span-4 p-3 border-r border-white/10 flex items-center text-xs text-white/80">
                                                {checklist.Metadata.roles[roleKey].area || '-'}
                                            </div>
                                            <div className="col-span-5 p-3 flex items-center gap-3">
                                                {checklist.Metadata.roles[roleKey].persona ? (
                                                    <React.Fragment>
                                                        <img src={`https://glencore.sharepoint.com/_layouts/15/userphoto.aspx?size=S&accountname=${checklist.Metadata.roles[roleKey].persona}`} className="w-6 h-6 rounded-full border border-white/20 object-cover bg-gray-700" onError={(e) => { e.target.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23ccc' viewBox='0 0 24 24'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }} />
                                                        <span className="text-xs font-medium truncate" title={checklist.Metadata.roles[roleKey].persona}>{checklist.Metadata.roles[roleKey].persona}</span>
                                                    </React.Fragment>
                                                ) : <span className="text-white/30 text-xs italic">-</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row bg-black/40">
                                <div className="w-full md:w-1/3 flex border-b md:border-b-0 border-white/10">
                                    <div className="w-1/2 p-3 font-bold text-[10px] uppercase flex flex-col justify-center border-r border-white/10 text-white/50">Inicio Diligenciamiento <span className="text-white text-xs mt-1">{checklist.Metadata.fechaInicioDiligenciamiento || '-'}</span></div>
                                    <div className="w-1/2 p-3 font-bold text-[10px] uppercase flex flex-col justify-center border-r border-white/10 text-white/50">Fin Diligenciamiento <span className="text-white text-xs mt-1">{checklist.Metadata.fechaFinDiligenciamiento || '-'}</span></div>
                                </div>
                                <div className="w-full md:w-2/3 flex">
                                    <div className="w-full p-4 text-xs">
                                        <span className="font-bold text-[10px] uppercase text-white/50 block mb-1">Comentarios Generales Metadatos:</span>
                                        <span className="text-white/80 whitespace-pre-wrap">{checklist.Metadata.comentarios || '-'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="space-y-4 mb-8">
                        {checklist.items.map((it, idx) => {
                            const isEditing = editingId === it.Id;
                            const currentItem = isEditing ? editForm : it;
                            const isMyTask = currentUser === it.NombreResponsable;
                            const showAlert = it.Alerta === "Si";

                            return (
                                <div key={it.Id} className={`p-5 rounded-2xl border transition-all ${showAlert ? 'bg-red-900/60 backdrop-blur-2xl border-red-500/80 shadow-[0_0_20px_rgba(239,68,68,0.4)]' : 'bg-black/80 backdrop-blur-2xl border-white/20 shadow-[0_0_20px_rgba(0,0,0,0.3)]'}`}>
                                    <div className="flex justify-between items-start gap-4">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2 border-b border-white/10 pb-3">
                                                <span className={`text-xs font-bold px-2.5 py-1 rounded-md mt-0.5 shadow-inner ${showAlert ? 'bg-red-500 text-white' : 'bg-white/10 text-white border border-white/5'}`}>#{idx + 1}</span>
                                                {isEditing ? (
                                                    <textarea className="bg-black/50 text-white border border-white/30 px-3 py-2 rounded-lg w-full break-words whitespace-normal outline-none focus:border-yellow-400" rows="2" value={currentItem.Descripcion} onChange={e => setEditForm({...editForm, Descripcion: e.target.value})} />
                                                ) : (
                                                    <h4 className={`text-lg font-bold leading-snug break-words whitespace-normal text-[15px] ${showAlert ? 'text-red-200' : 'text-yellow-400'}`}>{it.Descripcion}</h4>
                                                )}
                                            </div>
                                            
                                            <div className="grid grid-cols-2 lg:grid-cols-6 gap-6 mt-4 text-sm">
                                                <div className="col-span-1">
                                                    <span className="text-white/40 block text-[10px] font-bold uppercase tracking-wider mb-1">Responsable</span>
                                                    {isEditing ? (
                                                        <PeoplePicker 
                                                            className="bg-black/50 text-white border border-white/30 px-2 py-1.5 rounded-md w-full text-xs cursor-pointer outline-none focus:border-yellow-400"
                                                            value={currentItem.NombreResponsable || ''} 
                                                            onChange={val => setEditForm({...editForm, NombreResponsable: val})}
                                                        />
                                                    ) : (
                                                        <div className="flex items-center gap-2">
                                                            <img 
                                                                src={`https://glencore.sharepoint.com/_layouts/15/userphoto.aspx?size=S&accountname=${it.NombreResponsable}`}
                                                                className="w-7 h-7 rounded-full border border-white/20 object-cover bg-gray-700"
                                                                onError={(e) => { e.target.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23ccc' viewBox='0 0 24 24'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }}
                                                            />
                                                            <span className="text-white font-medium text-xs break-all">{it.NombreResponsable}</span>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="col-span-1">

        const Login = ({ onLogin }) => {
            const [user, setUser] = React.useState('');
            const [pswd, setPswd] = React.useState('');
            const [error, setError] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);

                const LIST_NAME = "User-CheckList";
                const url = SITE_URL + "/_api/web/lists/getbytitle('" + encodeURIComponent(LIST_NAME) + "')/items?$filter=User eq '" + user + "' and Password eq '" + pswd + "'&$select=User,Rol";
                
                try {
                    const res = await fetch(url, { method: 'GET', headers: { "Accept": "application/json;odata=verbose" }, credentials: 'same-origin' });
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    const json = await res.json();
                    const results = (json.d && json.d.results) || [];

                    if (results.length > 0) {
                        onLogin(results[0].User, results[0].Rol);
                    } else {
                        setError('Usuario o contrase\u00f1a incorrectos.');
                    }
                } catch (err) {
                    console.error("REST Error:", err);
                    setError('Error 404/Conexi\u00f3n. Ejecuta desde SharePoint.');
                } finally {
                    setIsLoading(false);
                }
            };

            const inputClasses = "w-full bg-white/90 text-gray-900 border border-transparent focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 rounded-xl px-4 py-3 outline-none transition-all duration-300 placeholder-transparent peer";
