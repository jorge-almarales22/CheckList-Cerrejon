            });

            return json.d.ListItemEntityTypeFullName;

        const saveToSPList = async (listName, data, digest) => {
            const entityType = await getEntityType(listName);
            const res = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('${listName}')/items`, {
                method: 'POST',
                headers: {
                    "Accept": "application/json;odata=verbose",
                    "Content-Type": "application/json;odata=verbose",
                    "X-RequestDigest": digest
                },
                credentials: 'same-origin',
                body: JSON.stringify({ "__metadata": { "type": entityType }, ...data })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} error saving to ${listName}`);
            return res.json();
        };

                    "X-RequestDigest": digest,
                    "X-HTTP-Method": "MERGE",
                    "If-Match": "*"
                },
                credentials: 'same-origin',
                body: JSON.stringify({ "__metadata": { "type": entityType }, ...data })
            });

        const fileToBase64 = (file) => new Promise((resolve, reject) => {

        });

        const calcularCumplimiento = (fechaInicio, fechaFin) => {
            if (!fechaFin || !fechaInicio) return 0;
            const start = new Date(fechaInicio); start.setHours(0, 0, 0, 0);
            const end = new Date(fechaFin); end.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);

            const totalDiff = end.getTime() - start.getTime();
            if (totalDiff <= 0) return 100;
            const currentDiff = today.getTime() - start.getTime();
            let percent = (currentDiff / totalDiff) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            return Math.round(percent);
        };

        const calcularPromedioChecklist = (items) => {
            if (!items || items.length === 0) return 0;
            let total = 0;
            items.forEach(it => { total += calcularCumplimiento(it.FechaInicio, it.FechaFin); });
            return Math.round(total / items.length);
        };

        const calcularPromedioReal = (items) => {
            if (!items || items.length === 0) return 0;
            let total = 0;
            items.forEach(it => { total += parseInt(it.Avance) || 0; });
            return Math.round(total / items.length);

        const PeoplePicker = ({ value, onChange, placeholder, className }) => {
            const [query, setQuery] = React.useState(value || '');
            const [results, setResults] = React.useState([]);
            const [isOpen, setIsOpen] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const wrapperRef = React.useRef(null);

            React.useEffect(() => {
                setQuery(value || '');
            }, [value]);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            React.useEffect(() => {
                if (!query || query === value) {
                    setResults([]);
                    return;
                }

                const delayDebounceFn = setTimeout(async () => {
                    setLoading(true);
                    try {
                        const digest = await getRequestDigest();
                        const response = await fetch(`${SITE_URL}/_api/SP.UI.ApplicationPages.ClientPeoplePickerWebServiceInterface.clientPeoplePickerSearchUser`, {
                            method: 'POST',
                            headers: {
                                "Accept": "application/json;odata=verbose",
                                "Content-Type": "application/json;odata=verbose",
                                "X-RequestDigest": digest
                            },
                            credentials: 'same-origin',
                            body: JSON.stringify({
                                queryParams: {
                                    __metadata: { type: "SP.UI.ApplicationPages.ClientPeoplePickerQueryParameters" },
                                    AllowEmailAddresses: true,
                                    AllowMultipleEntities: false,
                                    AllUrlZones: false,
                                    MaximumEntitySuggestions: 10,
                                    PrincipalSource: 15,
                                    PrincipalType: 1,
                                    QueryString: query
                                }
                            })
                        });
                        const data = await response.json();
                        const parsedResults = JSON.parse(data.d.ClientPeoplePickerSearchUser);
                        setResults(parsedResults);
                        setIsOpen(true);
                    } catch (error) {
                        console.error("Error searching users:", error);
                    } finally {
                        setLoading(false);
                    }
                }, 500);

                return () => clearTimeout(delayDebounceFn);
            }, [query, value]);

            const handleSelect = (user) => {
                const email = user.EntityData.Email || user.Key;
                setQuery(email);
                setIsOpen(false);
                onChange(email);
            };

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <input
                        type="text"
                        className={className}
                        placeholder={placeholder || "Buscar usuario AD..."}
                        value={query}
                        onChange={(e) => {
                            setQuery(e.target.value);
                            if(e.target.value !== value) onChange('');
                        }}
                        onFocus={() => { if(results.length > 0) setIsOpen(true); }}
                        required
                    />

                        <ul className="absolute z-50 w-full bg-gray-800 border border-white/20 rounded-lg mt-1 max-h-60 overflow-y-auto shadow-2xl">
                            {results.map((user, idx) => (
                                <li
                                    key={idx}
                                    className="px-4 py-3 hover:bg-white/10 cursor-pointer border-b border-white/5 last:border-0 flex items-center gap-3"
                                    onClick={() => handleSelect(user)}
                                >
                                    <img 
                                        src={`https://glencore.sharepoint.com/_layouts/15/userphoto.aspx?size=S&accountname=${user.EntityData.Email || user.Key}`}
                                        alt={user.DisplayText}
                                        className="w-10 h-10 rounded-full border border-white/20 object-cover bg-gray-700"

                                    />

                                        <span className="text-white font-bold text-sm leading-tight">{user.DisplayText}</span>
                                        <span className="text-white/50 text-xs">{user.EntityData.Email || user.Key}</span>
                                    </div>

        const GanttChart = ({ items }) => {
            if (!items || items.length === 0) return null;

            const getValidDate = (d) => d ? new Date(d) : null;
            let minDate = new Date('2999-12-31');
            let maxDate = new Date('1970-01-01');
            let hasAnyDate = false;

            items.forEach(it => {
                const d1 = getValidDate(it.FechaBaselineInicio);
                const d2 = getValidDate(it.FechaBaselineFin);
                const d3 = getValidDate(it.FechaInicio);
                const d4 = getValidDate(it.FechaFin);
                
                if(d1 && d1 < minDate) { minDate = d1; hasAnyDate = true; }
                if(d3 && d3 < minDate) { minDate = d3; hasAnyDate = true; }
                if(d2 && d2 > maxDate) { maxDate = d2; hasAnyDate = true; }
                if(d4 && d4 > maxDate) { maxDate = d4; hasAnyDate = true; }
            });

            if (!hasAnyDate) return (
                <div className="bg-gray-900/80 p-6 rounded-2xl border border-white/20 shadow-2xl mt-8 text-center text-white/50">
                    No hay tareas con Fechas (Baseline o Reales) v&aacute;lidas para generar el Diagrama de Gantt.
                </div>
            );
            
            let totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);
            if (totalDays <= 0) totalDays = 1;

            return (
                <div className="bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] mt-8 overflow-x-auto animate-[fadeIn_0.5s_ease-out]">
                    <h3 className="text-xl font-bold text-yellow-400 mb-6 flex items-center gap-2">
                        &#128200; Diagrama de Gantt del Checklist
                    </h3>
                    
                    <div className="min-w-[800px] pb-4">
                        <div className="flex justify-between text-xs font-bold text-white/50 mb-3 px-[220px] border-b border-white/10 pb-2">
                            <span>Inicio Proyecto: {minDate.toISOString().split('T')[0]}</span>
                            <span>Fin Proyecto: {maxDate.toISOString().split('T')[0]}</span>
                        </div>

                        <div className="space-y-4 relative">
                            {items.map((it, idx) => {
                                const baseStart = getValidDate(it.FechaBaselineInicio);
                                const baseEnd = getValidDate(it.FechaBaselineFin);
                                const actStart = getValidDate(it.FechaInicio);
                                const actEnd = getValidDate(it.FechaFin);
                                const avance = parseInt(it.Avance) || 0;

                                // Baseline Math
                                let baseLeftPercent = 0, baseWidthPercent = 0;
                                if (baseStart && baseEnd) {
                                    const leftDays = (baseStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (baseEnd - baseStart) / (1000 * 60 * 60 * 24);
                                    if(durDays < 1) durDays = 1;
                                    baseLeftPercent = (leftDays / totalDays) * 100;
                                    baseWidthPercent = (durDays / totalDays) * 100;
                                }

                                // Actual Math
                                let actLeftPercent = 0, actWidthPercent = 0;
                                if (actStart && actEnd) {
                                    const leftDays = (actStart - minDate) / (1000 * 60 * 60 * 24);
                                    let durDays = (actEnd - actStart) / (1000 * 60 * 60 * 24);
                                    if(durDays < 1) durDays = 1;
                                    actLeftPercent = (leftDays / totalDays) * 100;
                                    actWidthPercent = (durDays / totalDays) * 100;
                                }

                                return (
                                    <div key={it.Id || idx} className="flex items-center gap-4 text-sm group">
                                        <div className="w-[200px] flex-shrink-0 text-white/80 whitespace-normal break-words font-medium text-xs leading-tight" title={it.Descripcion}>
                                            <span className="text-white/40 mr-1 font-bold">{idx + 1}.</span> {it.Descripcion}
                                        </div>
                                        
                                        <div className="flex-1 bg-white/5 h-12 rounded-lg relative overflow-hidden flex flex-col justify-center gap-1 border border-white/5">
                                            
                                            {/* Baseline Bar (Plan) */}
                                            {baseStart && baseEnd && (
                                                <div 
                                                    className="absolute h-2 top-1.5 bg-[repeating-linear-gradient(45deg,transparent,transparent_2px,rgba(96,165,250,0.5)_2px,rgba(96,165,250,0.5)_4px)] bg-blue-900/30 border border-blue-400/50 rounded-sm"
                                                    style={{ left: `${baseLeftPercent}%`, width: `${baseWidthPercent}%` }}
                                                    title={`Planificado (Baseline): ${it.FechaBaselineInicio} a ${it.FechaBaselineFin}`}
                                                ></div>
                                            )}

                                            {/* Actual Bar */}
                                            {actStart && actEnd && (
                                                <div 
                                                    className="absolute h-5 bottom-1.5 bg-yellow-600/40 border border-yellow-500/50 rounded flex flex-col justify-center overflow-hidden transition-all duration-300 shadow-inner"
                                                    style={{ left: `${actLeftPercent}%`, width: `${actWidthPercent}%` }}
                                                    title={`Real: ${it.FechaInicio} a ${it.FechaFin} \nAvance: ${avance}%`}
                                                >
                                                    <div 
                                                        className="absolute top-0 left-0 h-full bg-gradient-to-r from-yellow-400 to-yellow-500 transition-all duration-500" 
                                                        style={{ width: `${avance}%` }}
                                                    ></div>
                                                    <span className="relative z-10 text-[10px] font-extrabold text-black px-2 drop-shadow-md truncate">
                                                        {avance}%
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const CrearCheckList = ({ onAtras, currentUser, currentRole, templateType }) => {
            const [nombreChecklist, setNombreChecklist] = React.useState('');
            const [isSaving, setIsSaving] = React.useState(false);
            
            const [items, setItems] = React.useState(() => {
                let sourceArray = [];
                if (templateType === 'proyectos') {
                    sourceArray = CHECKLIST_PROYECTOS_ITEMS;
                } else if (templateType === 'compra_instalada') {
                    sourceArray = CHECKLIST_COMPRA_INSTALADA;
                } else if (templateType === 'ensamble') {
                    sourceArray = CHECKLIST_EQUIPOS_NUEVOS_USADOS_ENSAMBLE;
                } else {
                    sourceArray = PREDEFINED_ITEMS; // Fallback
                }

                const hoy = new Date().toISOString().split('T')[0];
                return sourceArray.map((act, idx) => ({
                    id: Date.now() + Math.random().toString(36).substr(2, 5) + idx,
                    actividades: act,
                    rolResponsable: 'Responsable',
                    entregable: '',
                    nombreResponsable: '',
                    avance: '0',
                    fechaBaselineInicio: hoy,
                    fechaBaselineFin: '',
                    fechaInicio: hoy,
                    fechaFin: '',
                    comentarioAdmin: '',
                    isAlert: false
                }));
            });

            const [formData, setFormData] = React.useState({
                actividades: '', rolResponsable: 'Responsable', entregable: '',
                nombreResponsable: '', avance: '', 
                fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                fechaInicio: new Date().toISOString().split('T')[0], fechaFin: '',
            });

            const [editingId, setEditingId] = React.useState(null);

            const handleItemEdit = (id, field, value) => {
                if (field === 'avance') {
                    let val = parseInt(value) || 0;
                    if (val >= 100) val = 99; 
                    value = val.toString();
                }
                setItems(prev => prev.map(it => it.id === id ? { ...it, [field]: value } : it));
            };

            const handleChange = (e) => {
                let { name, value } = e.target;
                if (name === 'avance') {
                    let val = parseInt(value) || 0;
                    if (val >= 100) val = 99; 
                    value = val.toString();
                }
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                const newItem = {
                    ...formData,
                    id: Date.now() + Math.random().toString(36).substr(2, 5),
                };
                setItems([...items, newItem]);
                setFormData({ 
                    actividades: '', rolResponsable: 'Responsable', entregable: '', nombreResponsable: '', avance: '', 
                    fechaBaselineInicio: new Date().toISOString().split('T')[0], fechaBaselineFin: '',
                    fechaInicio: new Date().toISOString().split('T')[0], fechaFin: '' 
                });
            };

            const handleDeleteItem = (id) => setItems(items.filter(it => it.id !== id));

            const handleGuardarChecklist = async () => {
                if (!nombreChecklist.trim()) { alert('Ingresa el nombre del checklist.'); return; }
                if (items.length === 0) { alert('Agrega al menos un \u00edtem.'); return; }

                const has100 = items.some(it => parseInt(it.avance) >= 100);
                if (has100) {
                    alert("⚠️ No puedes guardar tareas con 100% de avance inicial, ya que aún no tienen evidencia cargada. Por favor edita esos ítems.");
                    return;
                }

                setIsSaving(true);
                const newChecklistId = 'CHK-' + Date.now();

                try {
                    const digest = await getRequestDigest();

                    // Construimos la estructura de datos para la columna JSON
                    const finalItems = items.map((it) => ({
                        Id: it.id,
                        Descripcion: it.actividades,
                        NombreResponsable: it.nombreResponsable,
                        Entregable: it.entregable,
                        Avance: it.avance ? it.avance.toString() : "0",
                        FechaBaselineInicio: it.fechaBaselineInicio,
                        FechaBaselineFin: it.fechaBaselineFin,
                        FechaInicio: it.fechaInicio,
                        FechaFin: it.fechaFin,
                        Alerta: "No",
                        ComentarioAdm: "",
                        ComentarioPropio: "",
                        Evidencias: ""
                    }));

                    const checklistData = {
                        ID_x002d_checklist: newChecklistId,
                        Name: nombreChecklist,
                        ComentarioGeneral: "",
                        items: finalItems
                    };

                    // Guardado centralizado JSON
                    await saveToSPList('DB_CHECKLIST_APP', {
                        Title: newChecklistId,
                        Data: JSON.stringify(checklistData)
                    }, digest);

                    alert('\u00a1Checklist guardado con \u00e9xito en SharePoint (JSON optimizado)!');
                    onAtras();

                } catch (error) {
                    console.error("Error saving:", error);
                    alert("Ocurri\u00f3 un error guardando en SharePoint. Verifica la consola.");
                } finally {
                    setIsSaving(false);
                }
            };

            const inputClasses = "w-full bg-white/90 text-gray-900 border border-transparent focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 rounded-lg px-4 py-2.5 outline-none transition-all duration-300";
            const labelClasses = "block text-sm font-semibold text-white/90 mb-1.5";

            let titlePrefix = "Crear Nuevo Checklist";
            if(templateType === 'proyectos') titlePrefix = "Plantilla: Proyectos";
            if(templateType === 'compra_instalada') titlePrefix = "Plantilla: Compra Instalada";
            if(templateType === 'ensamble') titlePrefix = "Plantilla: Ensamble";

            return (
                <div className="bg-black/80 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] text-white mt-8 mx-auto max-w-5xl">
                    <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/20">
                        <h2 className="text-2xl lg:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{titlePrefix}</h2>
                        <button className="bg-white/10 hover:bg-white/20 border border-white/30 text-white text-sm font-semibold py-2 px-4 rounded-lg flex items-center gap-2" onClick={onAtras}>
                            <span>&larr;</span> Volver al Listado
                        </button>
                    </div>

                    <div className="mb-6">
                        <label className={labelClasses}>Nombre del Checklist</label>
                        <input type="text" className={inputClasses + " text-lg font-bold"} placeholder="Ej. Nuevo Proyecto" value={nombreChecklist} onChange={(e) => setNombreChecklist(e.target.value)} required />
                    </div>

                    <div className="bg-white/5 p-6 rounded-xl border border-white/10 mb-8">
                        <h3 className="text-xl font-bold text-yellow-400 mb-4 border-b border-white/10 pb-2">&#10133; Agregar Nuevo &Iacute;tem</h3>
                        <form onSubmit={handleAddItem} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                <div className="md:col-span-12">
                                    <label className={labelClasses}>Descripci&oacute;n</label>
                                    <textarea className={inputClasses} name="actividades" value={formData.actividades} onChange={handleChange} rows="2" required></textarea>
                                </div>
                                <div className="md:col-span-4">
                                    <label className={labelClasses}>Responsable (Directorio SP)</label>
                                    <PeoplePicker 
                                        className={inputClasses} 
                                        value={formData.nombreResponsable} 
                                        onChange={(val) => setFormData(prev => ({ ...prev, nombreResponsable: val }))} 
                                    />
                                </div>
                                <div className="md:col-span-4">
                                    <label className={labelClasses}>Entregable</label>
                                    <input type="text" className={inputClasses} name="entregable" value={formData.entregable} onChange={handleChange} required />
                                </div>
                                <div className="md:col-span-4">
                                    <label className={labelClasses}>Avance (%)</label>
                                    <input type="number" min="0" max="99" className={inputClasses} name="avance" value={formData.avance} onChange={handleChange} required />
                                </div>
                                
                                {/* Baseline Dates */}
                                <div className="md:col-span-3">
                                    <label className={labelClasses}>Plan Inicio (Baseline)</label>
                                    <input type="date" className={inputClasses + " bg-blue-50"} name="fechaBaselineInicio" value={formData.fechaBaselineInicio} onChange={handleChange} required title="Esta fecha no podr&aacute; cambiarse" />
                                </div>
                                <div className="md:col-span-3">
                                    <label className={labelClasses}>Plan Fin (Baseline)</label>
                                    <input type="date" className={inputClasses + " bg-blue-50"} name="fechaBaselineFin" value={formData.fechaBaselineFin} onChange={handleChange} required title="Esta fecha no podr&aacute; cambiarse" />
                                </div>

                                {/* Actual Dates */}
                                <div className="md:col-span-3">
                                    <label className={labelClasses}>Fecha Inicio Real</label>
                                    <input type="date" className={inputClasses + " bg-yellow-50"} name="fechaInicio" value={formData.fechaInicio} onChange={handleChange} required />
                                </div>
                                <div className="md:col-span-3">
                                    <label className={labelClasses}>Fecha Fin Real</label>
                                    <input type="date" className={inputClasses + " bg-yellow-50"} name="fechaFin" value={formData.fechaFin} onChange={handleChange} required />
                                </div>
                            </div>
                            <div className="flex justify-end pt-2">
                                <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-lg shadow-lg transition-colors">A&ntilde;adir &Iacute;tem</button>
                            </div>
                        </form>
                    </div>

                    <div className="mb-8">
                        <h3 className="text-lg font-bold text-white mb-3">&Iacute;tems de este Checklist ({items.length})</h3>
                        {items.length === 0 ? (
                            <div className="text-center py-8 bg-black/40 rounded-xl border border-white/5 border-dashed">
                                <p className="text-white/50">A&uacute;n no hay &iacute;tems en este checklist.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {items.map((it, idx) => (
                                    <div
                                        key={it.id}
                                        className={`bg-white/5 p-4 rounded-lg border ${editingId === it.id ? 'border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.2)]' : 'border-white/10'} flex justify-between items-start transition-all`}
                                        onDoubleClick={() => setEditingId(it.id)}
                                    >
                                        <div className="flex-1 mr-4">
                                            <div className="flex items-start gap-2 mb-1">
                                                <span className="bg-white/20 text-xs font-bold px-2 py-0.5 rounded mt-0.5">#{idx + 1}</span>
                                                {editingId === it.id ? (
                                                    <textarea
                                                        className="w-full bg-black/40 text-yellow-400 border border-yellow-400/50 rounded px-2 py-1 text-sm outline-none resize-none break-words whitespace-normal"
                                                        value={it.actividades}
                                                        onChange={(e) => handleItemEdit(it.id, 'actividades', e.target.value)}
                                                        rows="2"
                                                        placeholder="Descripci\u00f3n de la actividad"
                                                    />
                                                ) : (
                                                    <h4 className="font-bold text-yellow-400 leading-tight break-words whitespace-normal">{it.actividades}</h4>
                                                )}
                                            </div>
                                            <div className="grid grid-cols-2 lg:grid-cols-6 gap-4 mt-3 text-sm">
                                                <div>
                                                    <span className="text-white/50 block text-xs">Responsable</span>
                                                    {editingId === it.id ? (
                                                        <PeoplePicker 
                                                            className="w-full bg-black/40 text-white border border-white/20 rounded px-2 py-1 text-xs outline-none mt-1"
                                                            value={it.nombreResponsable} 
                                                            onChange={(val) => handleItemEdit(it.id, 'nombreResponsable', val)} 
                                                        />
                                                    ) : (
                                                        <span className="text-white font-medium">{it.nombreResponsable || '-'}</span>
                                                    )}
                                                </div>
                                                <div>
                                                    <span className="text-white/50 block text-xs">Entregable</span>
                                                    {editingId === it.id ? (
                                                        <input type="text" className="w-full bg-black/40 text-white border border-white/20 rounded px-2 py-1 text-xs outline-none mt-1" value={it.entregable} onChange={(e) => handleItemEdit(it.id, 'entregable', e.target.value)} placeholder="Entregable" />
                                                    ) : (
                                                        <span className="text-white font-medium">{it.entregable || '-'}</span>
                                                    )}
                                                </div>
                                                <div>
                                                    <span className="text-white/50 block text-xs">Fechas Plan (Baseline)</span>
                                                    {editingId === it.id ? (
                                                        <div className="space-y-1 mt-1">
                                                            <div className="flex items-center gap-1 text-xs"><span className="w-4 font-bold text-blue-300">I:</span><input type="date" className="bg-blue-900/20 text-white border border-blue-400/40 rounded px-1 py-0.5 outline-none flex-1 focus:border-yellow-400" value={it.fechaBaselineInicio} onChange={(e) => handleItemEdit(it.id, 'fechaBaselineInicio', e.target.value)} /></div>
                                                            <div className="flex items-center gap-1 text-xs"><span className="w-4 font-bold text-blue-300">F:</span><input type="date" className="bg-blue-900/20 text-white border border-blue-400/40 rounded px-1 py-0.5 outline-none flex-1 focus:border-yellow-400" value={it.fechaBaselineFin} onChange={(e) => handleItemEdit(it.id, 'fechaBaselineFin', e.target.value)} /></div>
                                                        </div>
                                                    ) : (
                                                        <><span className="text-white font-medium block text-xs">I: {it.fechaBaselineInicio || '-'}</span><span className="text-white font-medium block text-xs">F: {it.fechaBaselineFin || '-'}</span></>
                                                    )}
                                                </div>
                                                <div>
                                                    <span className="text-white/50 block text-xs">Fechas Reales</span>
                                                    {editingId === it.id ? (
                                                        <div className="space-y-1 mt-1">
                                                            <div className="flex items-center gap-1 text-xs"><span className="w-4 font-bold text-white/50">I:</span><input type="date" className="bg-black/40 text-white border border-white/40 rounded px-1 py-0.5 outline-none flex-1 focus:border-yellow-400" value={it.fechaInicio} onChange={(e) => handleItemEdit(it.id, 'fechaInicio', e.target.value)} /></div>
                                                            <div className="flex items-center gap-1 text-xs"><span className="w-4 font-bold text-white/50">F:</span><input type="date" className="bg-black/40 text-white border border-white/40 rounded px-1 py-0.5 outline-none flex-1 focus:border-yellow-400" value={it.fechaFin} onChange={(e) => handleItemEdit(it.id, 'fechaFin', e.target.value)} /></div>
                                                        </div>
                                                    ) : (
                                                        <><span className="text-white font-medium block text-xs">I: {it.fechaInicio || '-'}</span><span className="text-white font-medium block text-xs">F: {it.fechaFin || '-'}</span></>
                                                    )}
                                                </div>
                                                <div>
                                                    <span className="text-white/50 block text-xs">Cumplimiento (calc)</span>
                                                    <span className="text-green-400 font-bold">{calcularCumplimiento(it.fechaInicio, it.fechaFin)}%</span>
                                                </div>
                                                <div>
                                                    <span className="text-white/50 block text-xs mt-1">Avance real:
                                                        {editingId === it.id ? (
                                                            <input type="number" className="w-16 ml-1 bg-black/40 text-yellow-400 border border-yellow-400/50 rounded px-1 outline-none inline-block text-xs" value={it.avance} onChange={(e) => handleItemEdit(it.id, 'avance', e.target.value)} min="0" max="99" />
                                                        ) : (
                                                            <span className="text-yellow-400 ml-1 font-bold">{it.avance}%</span>
                                                        )}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-2 min-w-[80px]">
                                            {editingId === it.id ? (
                                                <button onClick={() => setEditingId(null)} className="bg-green-500/20 hover:bg-green-500/40 border border-green-500/50 text-green-300 px-3 py-1.5 rounded text-xs font-bold transition-colors w-full">Listo</button>
                                            ) : (
                                                <button onClick={() => setEditingId(it.id)} className="bg-blue-500/20 hover:bg-blue-500/40 border border-blue-500/30 text-blue-300 px-3 py-1.5 rounded text-xs font-bold transition-colors w-full">Editar</button>
                                            )}
                                            <button onClick={() => handleDeleteItem(it.id)} className="bg-red-500/20 hover:bg-red-500/40 border border-red-500/30 text-red-300 px-3 py-1.5 rounded text-xs font-bold transition-colors w-full">Eliminar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <button onClick={handleGuardarChecklist} disabled={items.length === 0 || isSaving} className={`w-full font-extrabold text-lg py-4 rounded-xl shadow-lg transition-all ${items.length > 0 && !isSaving ? 'bg-gradient-to-r from-green-500 to-green-600 hover:-translate-y-0.5' : 'bg-gray-600 cursor-not-allowed'}`}>
                        {isSaving ? 'GUARDANDO...' : '\u2713 GUARDAR CHECKLIST'}
                    </button>
                </div>
            );
        };

        const CheckListDetalle = ({ checklistId, onAtras, role, currentUser }) => {
            const [checklist, setChecklist] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [editingId, setEditingId] = React.useState(null);
            const [editForm, setEditForm] = React.useState({});
            const [generalComment, setGeneralComment] = React.useState('');
            
            const isAdmin = role === 'Administrador';

            React.useEffect(() => {
                const fetchDetails = async () => {
                    try {
                        const listRes = await fetch(`${SITE_URL}/_api/web/lists/getbytitle('DB_CHECKLIST_APP')/items?$filter=Title eq '${checklistId}'`, {
                            headers: { "Accept": "application/json;odata=verbose" }, credentials: "same-origin"
                        });
                        const listJson = await listRes.json();
                        
                        if (listJson.d.results.length > 0) {
                            const row = listJson.d.results[0];
                            const parsedData = JSON.parse(row.Data);
                            
                            setChecklist({
                                ...parsedData,
                                SharePointId: row.Id 
                            });
                            setGeneralComment(parsedData.ComentarioGeneral || '');
                        }
                    } catch (error) {
                        console.error("Error loading details:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchDetails();
            }, [checklistId]);

            const handleFileUpload = async (itemId, e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const base64 = await fileToBase64(file);
                    const digest = await getRequestDigest();
                    
                    const updatedItems = checklist.items.map(it => it.Id === itemId ? { ...it, Evidencias: base64, Avance: "100" } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);

                    setChecklist(updatedChecklist);
                    alert('Evidencia cargada. Avance actualizado al 100% automáticamente.');
                } catch (error) {
                    alert('Error subiendo evidencia. Revisa la consola.');
                    console.error(error);
                }
            };

            const handleStartEdit = (item) => {
                setEditingId(item.Id);
                setEditForm({ ...item });
            };

            const handleSaveEdit = async () => {
                if (parseInt(editForm.Avance) >= 100 && (!editForm.Evidencias || editForm.Evidencias === "")) {
                    alert("⚠️ Error: No puedes guardar el avance al 100% sin antes haber cargado una evidencia.");
                    return; 
                }

                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === editForm.Id ? {
                        ...it,
                        Descripcion: editForm.Descripcion,
                        NombreResponsable: editForm.NombreResponsable,
                        FechaInicio: editForm.FechaInicio,
                        FechaFin: editForm.FechaFin,
                        Avance: editForm.Avance ? editForm.Avance.toString() : "0", 
                        ComentarioAdm: editForm.ComentarioAdm || "",
                        ComentarioPropio: editForm.ComentarioPropio || "",
                        Alerta: editForm.Alerta || "No"
                        // Nota: FechaBaselineInicio y FechaBaselineFin deliberadamente NO se guardan desde el form
                    } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);

                    setChecklist(updatedChecklist);
                    setEditingId(null);
                } catch (error) {
                    alert("Error guardando cambios. Revisa la consola.");
                    console.error(error);
                }
            };

            const handleSaveGeneralComment = async () => {
                try {
                    const digest = await getRequestDigest();
                    const updatedChecklist = { ...checklist, ComentarioGeneral: generalComment };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, {
                        Data: JSON.stringify(updatedChecklist)
                    }, digest);
                    setChecklist(updatedChecklist);
                    alert("Comentario general guardado exitosamente.");
                } catch (error) {
                    console.error(error);
                    alert("Error guardando el comentario general.");
                }
            };

            const toggleAlert = async (item) => {
                const newAlerta = item.Alerta === "Si" ? "No" : "Si";
                try {
                    const digest = await getRequestDigest();
                    const updatedItems = checklist.items.map(it => it.Id === item.Id ? { ...it, Alerta: newAlerta } : it);
                    const updatedChecklist = { ...checklist, items: updatedItems };

                    await updateSPListItem('DB_CHECKLIST_APP', checklist.SharePointId, { 
                        Data: JSON.stringify(updatedChecklist) 
                    }, digest);
                    setChecklist(updatedChecklist);
                } catch(error) { console.error(error); }
            };

            if (loading) return <div className="text-center text-white mt-20">Cargando detalles desde SharePoint...</div>;
            if (!checklist) return <div className="text-center text-white mt-20">Checklist no encontrado.</div>;

            return (
                <div className="max-w-7xl mx-auto animate-[fadeIn_0.3s_ease-out]">
                    <div className="flex justify-between items-center bg-black/80 backdrop-blur-2xl p-6 rounded-3xl border border-white/20 shadow-[0_0_30px_rgba(0,0,0,0.3)] mb-6">
                        <div>
                            <h2 className="text-3xl font-extrabold text-white mb-1"><span className="text-yellow-400">Checklist:</span> {checklist.Name}</h2>
                        </div>
                        <button className="bg-white/10 hover:bg-white/20 border border-white/30 text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2" onClick={onAtras}>
                            &larr; Volver
                        </button>
                    </div>

                    <div className="space-y-4 mb-8">
                        {checklist.items.map((it, idx) => {
                            const isEditing = editingId === it.Id;
                            const currentItem = isEditing ? editForm : it;
                            const isMyTask = currentUser === it.NombreResponsable;
                            const showAlert = it.Alerta === "Si";

                            return (
                                <div key={it.Id} className={`p-5 rounded-2xl border transition-all ${showAlert ? 'bg-red-900/60 backdrop-blur-2xl border-red-500/80 shadow-[0_0_20px_rgba(239,68,68,0.4)]' : 'bg-black/80 backdrop-blur-2xl border-white/20 shadow-[0_0_20px_rgba(0,0,0,0.3)]'}`}>
                                    <div className="flex justify-between items-start gap-4 flex-wrap md:flex-nowrap">
                                        <div className="flex-1 w-full">
                                            <div className="flex items-center justify-between mb-4 border-b border-white/10 pb-3">
                                                <div className="flex items-start gap-3 w-3/4">
                                                    <span className={`text-xs font-bold px-2 py-1 rounded mt-0.5 ${showAlert ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'}`}>&Iacute;tem {idx + 1}</span>
                                                    {isEditing ? (
                                                        <textarea className="bg-black/50 text-white border border-white/30 px-3 py-2 rounded-lg w-full break-words whitespace-normal outline-none focus:border-yellow-400" rows="2" value={currentItem.Descripcion} onChange={e => setEditForm({...editForm, Descripcion: e.target.value})} />
                                                    ) : (
                                                        <h4 className={`text-lg font-bold leading-tight break-words whitespace-normal ${showAlert ? 'text-red-200' : 'text-white'}`}>{it.Descripcion}</h4>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-2">

                <div className="h-screen flex flex-col overflow-hidden text-white pattern-bg">
                    <nav className="bg-black/80 backdrop-blur-2xl border-b border-white/10 px-6 py-4 shadow-[0_5px_30px_rgba(0,0,0,0.5)] sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => handleNavigate('home')}>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-black font-black text-xl shadow-lg group-hover:rotate-12 transition-transform duration-300">C</div>
                                <span className="text-xl font-bold text-white tracking-wide group-hover:text-yellow-400 transition-colors">Gesti&oacute;n Cerrej&oacute;n</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <button className="text-sm font-semibold hover:text-yellow-400 transition-colors hidden md:block" onClick={() => handleNavigate('checklist_all')}>Listar Checklists</button>
                                <div className="hidden md:block flex-col text-right ml-4">
                                    <span className="text-white/60 text-[10px] font-semibold uppercase tracking-wider block leading-tight">Usuario Activo</span>
                                    <span className="text-white font-bold block text-sm">{user} <span className="text-yellow-400 text-xs bg-yellow-400/10 px-2 py-0.5 rounded-full ml-1 border border-yellow-400/20">{role}</span></span>
                                </div>
                                <div className="h-8 w-px bg-white/20 hidden md:block"></div>
                                <button className="text-white/80 hover:text-red-400 font-semibold text-sm py-2 px-3 rounded-lg hover:bg-red-400/10" onClick={onLogout}>Cerrar Sesi&oacute;n</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8">
                        {view === 'home' && (
                            <div className="max-w-7xl mx-auto flex flex-col items-center justify-center mt-8 md:mt-16 animate-[fadeIn_0.5s_ease-out]">
                                <div className="bg-black/80 backdrop-blur-2xl border border-white/20 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] text-center max-w-2xl w-full">
                                    <h1 className="text-4xl font-extrabold text-white mb-4 tracking-tight">&iexcl;Bienvenido al portal!</h1>
                                    <button onClick={() => handleNavigate('checklist_all')} className="bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold py-3.5 px-8 rounded-xl transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)] hover:shadow-[0_0_30px_rgba(234,179,8,0.5)]">
                                        Ir al Panel de Checklists &rarr;
                                    </button>
                                </div>
                            </div>
                        )}
                        {view === 'checklist_all' && <CheckListAll onView={handleNavigate} role={role} currentUser={user} />}
                        {view === 'crear_checklist' && <CrearCheckList currentUser={user} currentRole={role} templateType={selectedChecklistId} onAtras={() => handleNavigate('checklist_all')} />}
                        {view === 'checklist_detalle' && <CheckListDetalle checklistId={selectedChecklistId} role={role} currentUser={user} onAtras={() => handleNavigate('checklist_all')} />}
                    </main>

                    <style dangerouslySetInnerHTML={{ __html: `
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
                    `}} />
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [currentUser, setCurrentUser] = React.useState('');
            const [currentRole, setCurrentRole] = React.useState('');
            const handleLogin = (user, role) => { setIsLoggedIn(true); setCurrentUser(user); setCurrentRole(role); };
            const handleLogout = () => { setIsLoggedIn(false); setCurrentUser(''); setCurrentRole(''); };
            return isLoggedIn ? <Dashboard user={currentUser} role={currentRole} onLogout={handleLogout} /> : <Login onLogin={handleLogin} />;
        };

        const rootContainer = document.getElementById('root');
        if (rootContainer) { const root = ReactDOM.createRoot(rootContainer); root.render(<App />); }
    </script>
</body>
</html>
